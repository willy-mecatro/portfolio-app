<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#09090B">
<title>Portfolio</title>
<style>
/* ═══════════════════════════════════════════════
   DESIGN TOKENS
═══════════════════════════════════════════════ */
:root {
  --accent: #16A34A;
  --accent-light: #22C55E;
  --danger: #DC2626;
  --danger-light: #EF4444;
  --blue: #2563EB;
  --blue-light: #3B82F6;
  --amber: #D97706;
  --amber-light: #F59E0B;
  --purple: #7C3AED;
  --purple-light: #8B5CF6;

  --radius-sm: 8px;
  --radius: 12px;
  --radius-lg: 18px;
  --radius-xl: 24px;

  --shadow-sm: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
  --shadow: 0 4px 16px rgba(0,0,0,.10), 0 2px 4px rgba(0,0,0,.04);
  --shadow-lg: 0 10px 40px rgba(0,0,0,.15), 0 4px 8px rgba(0,0,0,.06);

  --font: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
  --font-mono: 'SF Mono', 'Fira Code', 'Fira Mono', monospace;

  --transition: 0.18s cubic-bezier(.4,0,.2,1);
}

/* DARK THEME */
[data-theme="dark"] {
  --bg: #09090B;
  --bg-2: #111113;
  --bg-3: #18181B;
  --bg-4: #1F1F23;
  --border: #27272A;
  --border-2: #3F3F46;
  --text-1: #FAFAFA;
  --text-2: #A1A1AA;
  --text-3: #71717A;
  --text-4: #52525B;
  --overlay: rgba(0,0,0,.7);
}

/* LIGHT THEME */
[data-theme="light"] {
  --bg: #FAFAFA;
  --bg-2: #FFFFFF;
  --bg-3: #F4F4F5;
  --bg-4: #E4E4E7;
  --border: #E4E4E7;
  --border-2: #D4D4D8;
  --text-1: #09090B;
  --text-2: #52525B;
  --text-3: #71717A;
  --text-4: #A1A1AA;
  --overlay: rgba(0,0,0,.4);
  --shadow-sm: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.03);
  --shadow: 0 4px 16px rgba(0,0,0,.07), 0 2px 4px rgba(0,0,0,.03);
  --shadow-lg: 0 10px 40px rgba(0,0,0,.10), 0 4px 8px rgba(0,0,0,.04);
}

/* ═══════════════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════════════ */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html { height:100%; font-size:16px; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text-1);
  height: 100%;
  overflow: hidden;
  transition: background var(--transition), color var(--transition);
}
button { font-family: inherit; cursor: pointer; border: none; background: none; }
input { font-family: inherit; }
a { text-decoration: none; }

/* ═══════════════════════════════════════════════
   LAYOUT — DESKTOP SIDEBAR + MOBILE BOTTOM NAV
═══════════════════════════════════════════════ */
.app {
  display: flex;
  height: 100vh;
  max-width: 1280px;
  margin: 0 auto;
}

/* SIDEBAR (desktop) */
.sidebar {
  width: 240px;
  flex-shrink: 0;
  background: var(--bg-2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 24px 16px;
  gap: 4px;
}
.sidebar-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  margin-bottom: 20px;
}
.logo-icon {
  width: 32px; height: 32px;
  background: var(--accent);
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
}
.logo-icon svg { color: white; }
.logo-text { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; }
.logo-sub { font-size: 11px; color: var(--text-3); margin-top: 1px; }

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: var(--radius);
  color: var(--text-2);
  font-size: 14px;
  font-weight: 500;
  transition: all var(--transition);
  cursor: pointer;
}
.nav-item:hover { background: var(--bg-3); color: var(--text-1); }
.nav-item.active { background: var(--bg-3); color: var(--text-1); font-weight: 600; }
.nav-item svg { flex-shrink: 0; opacity: 0.7; }
.nav-item.active svg { opacity: 1; color: var(--accent); }

.sidebar-bottom {
  margin-top: auto;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

/* MAIN CONTENT */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-width: 0;
}

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 24px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-2);
  flex-shrink: 0;
}
.topbar-title { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; }
.topbar-actions { display: flex; align-items: center; gap: 8px; }

.content { flex: 1; overflow-y: auto; padding: 24px; }
.content::-webkit-scrollbar { width: 4px; }
.content::-webkit-scrollbar-track { background: transparent; }
.content::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 4px; }

/* BOTTOM NAV (mobile) */
.bottom-nav {
  display: none;
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--bg-2);
  border-top: 1px solid var(--border);
  padding: 8px 0 max(12px, env(safe-area-inset-bottom));
  z-index: 100;
}
.bottom-nav-inner { display: flex; }
.bottom-nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 4px 0;
  color: var(--text-3);
  font-size: 10px;
  font-weight: 500;
  transition: color var(--transition);
}
.bottom-nav-item.active { color: var(--accent); }
.bottom-nav-item svg { transition: transform var(--transition); }
.bottom-nav-item.active svg { transform: scale(1.1); }

/* MOBILE TOPBAR */
.mobile-topbar {
  display: none;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-2);
  flex-shrink: 0;
}

/* ═══════════════════════════════════════════════
   COMPONENTS
═══════════════════════════════════════════════ */

/* ICON BUTTON */
.icon-btn {
  width: 36px; height: 36px;
  border-radius: var(--radius);
  display: flex; align-items: center; justify-content: center;
  color: var(--text-2);
  transition: all var(--transition);
  background: transparent;
}
.icon-btn:hover { background: var(--bg-3); color: var(--text-1); }
.icon-btn.active { background: var(--bg-3); color: var(--accent); }

/* BADGE */
.badge {
  display: inline-flex; align-items: center;
  padding: 3px 8px; border-radius: 6px;
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.3px;
}
.badge-green { background: rgba(22,163,74,.12); color: var(--accent-light); }
.badge-red { background: rgba(220,38,38,.12); color: var(--danger-light); }
.badge-blue { background: rgba(37,99,235,.12); color: var(--blue-light); }
.badge-amber { background: rgba(217,119,6,.12); color: var(--amber-light); }
.badge-purple { background: rgba(124,58,237,.12); color: var(--purple-light); }
.badge-neutral { background: var(--bg-3); color: var(--text-2); }

/* CARD */
.card {
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-sm);
}
.card-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
}
.card-title { font-size: 13px; font-weight: 600; color: var(--text-2); text-transform: uppercase; letter-spacing: 0.5px; }
.card-body { padding: 20px; }

/* DIVIDER */
.divider { height: 1px; background: var(--border); }

/* INPUT */
.input {
  width: 100%;
  background: var(--bg-3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 14px;
  color: var(--text-1);
  font-size: 14px;
  outline: none;
  transition: border-color var(--transition);
}
.input:focus { border-color: var(--accent); }
.input::placeholder { color: var(--text-4); }

/* BTN */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 9px 16px; border-radius: var(--radius);
  font-size: 13px; font-weight: 600;
  transition: all var(--transition);
}
.btn-primary { background: var(--accent); color: white; }
.btn-primary:hover { background: var(--accent-light); }
.btn-secondary { background: var(--bg-3); color: var(--text-1); border: 1px solid var(--border); }
.btn-secondary:hover { background: var(--bg-4); }
.btn-danger { background: rgba(220,38,38,.1); color: var(--danger-light); border: 1px solid rgba(220,38,38,.2); }
.btn-danger:hover { background: rgba(220,38,38,.2); }
.btn-sm { padding: 6px 12px; font-size: 12px; }
.btn-lg { padding: 12px 24px; font-size: 15px; border-radius: var(--radius-lg); }
.btn-full { width: 100%; }

/* STAT CHIP */
.stat-chip {
  display: flex; flex-direction: column;
  gap: 4px;
}
.stat-chip-label { font-size: 11px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.5px; }
.stat-chip-value { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; font-variant-numeric: tabular-nums; }
.stat-chip-sub { font-size: 12px; color: var(--text-3); }

/* LIVE DOT */
.live-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 10px; border-radius: 20px;
  background: var(--bg-3); border: 1px solid var(--border);
  font-size: 11px; color: var(--text-2); font-weight: 500;
}
.live-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 6px var(--accent);
  animation: pulse 2s infinite;
}
.live-dot.loading { background: var(--amber); box-shadow: 0 0 6px var(--amber); }
.live-dot.error { background: var(--danger); box-shadow: 0 0 6px var(--danger); animation: none; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }

/* TOGGLE SWITCH */
.toggle {
  width: 40px; height: 22px; border-radius: 11px;
  background: var(--border-2);
  position: relative; cursor: pointer; border: none;
  transition: background var(--transition);
  flex-shrink: 0;
}
.toggle.on { background: var(--accent); }
.toggle::after {
  content: ''; width: 16px; height: 16px; border-radius: 50%;
  background: white; position: absolute; top: 3px; left: 3px;
  transition: left var(--transition);
  box-shadow: 0 1px 3px rgba(0,0,0,.2);
}
.toggle.on::after { left: 21px; }

/* PROGRESS BAR */
.progress { height: 3px; background: var(--bg-4); border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 2px; transition: width 1.2s cubic-bezier(.4,0,.2,1); }

/* ═══════════════════════════════════════════════
   PAGES
═══════════════════════════════════════════════ */
.page { display: none; }
.page.active { display: block; }

/* ── DASHBOARD ── */
.dashboard-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 16px;
  margin-bottom: 24px;
}
@media(max-width:900px) { .dashboard-grid { grid-template-columns: 1fr 1fr; } }
@media(max-width:600px) { .dashboard-grid { grid-template-columns: 1fr; } }

.hero-card {
  grid-column: 1 / -1;
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-xl);
  padding: 32px;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  flex-wrap: wrap;
  gap: 20px;
  box-shadow: var(--shadow);
}
.hero-left {}
.hero-label { font-size: 12px; color: var(--text-3); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
.hero-value {
  font-size: 52px; font-weight: 800; letter-spacing: -2px;
  line-height: 1; margin-bottom: 12px;
  color: var(--text-1);
  font-variant-numeric: tabular-nums;
}
@media(max-width:600px) { .hero-value { font-size: 38px; } }
.hero-change { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.hero-right { text-align: right; }
.hero-stats { display: flex; gap: 32px; }
@media(max-width:600px) { .hero-stats { gap: 20px; } }

.accounts-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 16px;
}
@media(max-width:600px) { .accounts-grid { grid-template-columns: 1fr; } }

.account-card {
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  transition: border-color var(--transition);
}
.account-card:hover { border-color: var(--border-2); }
.account-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 16px 20px;
  cursor: pointer;
  user-select: none;
}
.acc-left { display: flex; align-items: center; gap: 12px; }
.acc-icon {
  width: 40px; height: 40px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.acc-name { font-size: 15px; font-weight: 700; }
.acc-platform { font-size: 12px; color: var(--text-3); margin-top: 1px; }
.acc-right { text-align: right; }
.acc-value { font-size: 17px; font-weight: 800; font-variant-numeric: tabular-nums; }
.acc-gain { font-size: 12px; font-weight: 600; margin-top: 2px; }
.acc-chevron { color: var(--text-4); transition: transform var(--transition); margin-top: 2px; }
.acc-chevron.open { transform: rotate(180deg); }

.holdings-list { border-top: 1px solid var(--border); }
.holding-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 13px 20px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background var(--transition);
}
.holding-row:last-child { border-bottom: none; }
.holding-row:hover { background: var(--bg-3); }
.h-left { flex: 1; min-width: 0; margin-right: 16px; }
.h-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.h-meta { display: flex; align-items: center; gap: 8px; margin-top: 3px; flex-wrap: wrap; }
.h-live { font-size: 11px; font-family: var(--font-mono); }
.h-right { text-align: right; flex-shrink: 0; }
.h-value { font-size: 14px; font-weight: 700; font-variant-numeric: tabular-nums; }
.h-perf { font-size: 12px; font-weight: 600; margin-top: 2px; }
.h-arrow { color: var(--text-4); margin-top: 2px; }

/* ── TICKER SCROLL ── */
.ticker-bar {
  background: var(--bg-3);
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  padding: 8px 0;
  overflow: hidden;
  white-space: nowrap;
  margin-bottom: 24px;
}
.ticker-scroll { display: inline-flex; gap: 40px; animation: tickerMove 25s linear infinite; }
.ticker-scroll:hover { animation-play-state: paused; }
@keyframes tickerMove { from{transform:translateX(0)} to{transform:translateX(-50%)} }
.ticker-item { display: inline-flex; align-items: center; gap: 8px; font-size: 12px; }
.ticker-name { color: var(--text-3); }
.ticker-price { font-weight: 700; font-family: var(--font-mono); }
.ticker-chg { font-size: 11px; font-family: var(--font-mono); }

/* ── DETAIL ── */
.detail-hero {
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-xl);
  padding: 28px;
  margin-bottom: 20px;
}
.detail-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; flex-wrap: wrap; margin-bottom: 20px; }
.detail-name { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 6px; }
.detail-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.detail-price-area { text-align: right; }
.detail-price { font-size: 32px; font-weight: 800; letter-spacing: -1px; font-variant-numeric: tabular-nums; }
.detail-change { font-size: 14px; font-weight: 600; margin-top: 4px; }

/* PERIOD ROW */
.period-row { display: flex; gap: 4px; background: var(--bg-3); padding: 4px; border-radius: var(--radius); margin-bottom: 16px; }
.period-btn { flex: 1; padding: 8px 4px; border-radius: 8px; font-size: 12px; font-weight: 600; color: var(--text-3); transition: all var(--transition); }
.period-btn:hover { color: var(--text-1); }
.period-btn.active { background: var(--bg-2); color: var(--text-1); box-shadow: var(--shadow-sm); }

/* CHART */
.chart-box {
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px 16px 12px;
  margin-bottom: 20px;
}
.chart-area { width: 100%; }
.chart-loading { height: 180px; display: flex; align-items: center; justify-content: center; color: var(--text-3); font-size: 13px; }
.chart-footer { display: flex; justify-content: space-between; margin-top: 8px; font-size: 11px; color: var(--text-4); font-family: var(--font-mono); }

/* TOOLTIP */
.chart-tooltip {
  position: absolute; pointer-events: none;
  background: var(--bg-2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 8px 12px;
  font-size: 12px; font-family: var(--font-mono);
  box-shadow: var(--shadow); z-index: 10;
  display: none; white-space: nowrap;
}
.chart-tooltip .tt-date { color: var(--text-3); font-size: 10px; margin-bottom: 3px; }
.chart-tooltip .tt-price { font-size: 15px; font-weight: 800; }
.chart-tooltip .tt-chg { font-size: 11px; margin-top: 2px; }
.chart-wrapper { position: relative; }
/* PIE */
.pie-section { margin-bottom: 24px; }
.pie-wrapper { display: flex; align-items: center; gap: 28px; flex-wrap: wrap; }
.pie-legend { display: flex; flex-direction: column; gap: 10px; flex: 1; min-width: 160px; }
.pie-legend-item { display: flex; align-items: center; gap: 10px; font-size: 13px; cursor: default; }
.pie-legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.pie-legend-label { color: var(--text-2); flex: 1; }
.pie-legend-val { font-weight: 700; font-family: var(--font-mono); font-size: 13px; }
.pie-legend-pct { color: var(--text-3); font-size: 11px; }
/* STATS TABLE */
.stats-table { display: flex; flex-direction: column; }
.stats-row { display: flex; justify-content: space-between; align-items: center; padding: 13px 0; border-bottom: 1px solid var(--border); }
.stats-row:last-child { border-bottom: none; }
.stats-label { font-size: 13px; color: var(--text-2); }
.stats-value { font-size: 14px; font-weight: 700; font-family: var(--font-mono); font-variant-numeric: tabular-nums; }

/* ── SIMULATION ── */
.sim-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
@media(max-width:700px) { .sim-layout { grid-template-columns: 1fr; } }
.sim-scenarios { display: flex; flex-direction: column; gap: 12px; }
.scenario-card {
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px;
  transition: border-color var(--transition);
}
.scenario-card:hover { border-color: var(--border-2); }
.sc-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.sc-label { font-size: 14px; font-weight: 700; }
.sc-rate { font-size: 12px; color: var(--text-3); font-family: var(--font-mono); }
.sc-fv { font-size: 30px; font-weight: 800; letter-spacing: -1px; margin-bottom: 14px; font-variant-numeric: tabular-nums; }
.sc-stats-row { display: flex; background: var(--bg-3); border-radius: var(--radius); padding: 10px; }
.sc-stat { flex: 1; text-align: center; }
.sc-stat-label { font-size: 10px; color: var(--text-4); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
.sc-stat-value { font-size: 13px; font-weight: 700; font-family: var(--font-mono); font-variant-numeric: tabular-nums; }
.sc-divider { width: 1px; background: var(--border); }

/* SLIDER */
.slider-wrap { margin-bottom: 4px; }
.slider-header { display: flex; justify-content: space-between; margin-bottom: 10px; }
.slider-label-txt { font-size: 13px; color: var(--text-2); }
.slider-val-txt { font-size: 15px; font-weight: 800; }
.slider-controls { display: flex; align-items: center; gap: 10px; }
.s-btn {
  width: 36px; height: 36px; border-radius: 10px;
  border: 1px solid var(--border); background: var(--bg-3);
  color: var(--text-1); font-size: 18px;
  display: flex; align-items: center; justify-content: center;
  transition: all var(--transition); font-weight: 300;
}
.s-btn:hover { background: var(--bg-4); }
.s-btn:active { transform: scale(.95); }
.s-track { flex: 1; height: 4px; background: var(--bg-4); border-radius: 4px; overflow: hidden; }
.s-fill { height: 100%; border-radius: 4px; transition: width .3s; }
.sim-total-label { text-align: center; font-size: 12px; color: var(--text-3); margin-top: 16px; }

/* ── ALERTES ── */
.alerts-list { display: flex; flex-direction: column; gap: 10px; }
.alert-card {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 18px;
  background: var(--bg-2); border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  transition: all var(--transition);
}
.alert-card.off { opacity: .45; }
.alert-left { display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0; }
.alert-icon-box {
  width: 36px; height: 36px; border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.alert-asset { font-size: 14px; font-weight: 700; }
.alert-cond { font-size: 12px; color: var(--text-3); margin-top: 2px; font-family: var(--font-mono); }
.alert-actions { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.alert-del { color: var(--text-4); font-size: 16px; transition: color var(--transition); }
.alert-del:hover { color: var(--danger); }

/* ALERT FORM */
.alert-form-card {
  background: var(--bg-2); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 20px; margin-bottom: 16px;
  display: none;
}
.alert-form-card.open { display: block; }
.type-row { display: flex; gap: 8px; margin-bottom: 10px; }
.type-btn {
  flex: 1; padding: 10px; border-radius: var(--radius);
  border: 1px solid var(--border); background: var(--bg-3);
  font-size: 13px; font-weight: 600; color: var(--text-2);
  transition: all var(--transition);
}
.type-btn.up.on { border-color: var(--accent); background: rgba(22,163,74,.08); color: var(--accent-light); }
.type-btn.dn.on { border-color: var(--danger); background: rgba(220,38,38,.08); color: var(--danger-light); }

/* ── EDIT PAGE ── */
.edit-section { margin-bottom: 16px; }
.edit-acc-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 16px;
  background: var(--bg-2); border: 1px solid var(--border);
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
}
.edit-acc-label { font-size: 14px; font-weight: 700; }
.edit-acc-platform { font-size: 11px; color: var(--text-3); }
.edit-holding-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 11px 16px;
  background: var(--bg); border-left: 1px solid var(--border);
  border-right: 1px solid var(--border); border-bottom: 1px solid var(--border);
}
.edit-holding-row:last-of-type { border-bottom: none; }
.edit-h-name { font-size: 13px; font-weight: 600; }
.edit-h-meta { font-size: 11px; color: var(--text-3); margin-top: 2px; }
.edit-actions { display: flex; gap: 6px; flex-shrink: 0; }
.add-row-btn {
  width: 100%; padding: 11px;
  border: 1px dashed var(--border-2); border-top: none;
  border-radius: 0 0 var(--radius-lg) var(--radius-lg);
  background: var(--bg-3); color: var(--text-3);
  font-size: 13px; font-weight: 600;
  transition: all var(--transition);
}
.add-row-btn:hover { color: var(--text-1); background: var(--bg-4); }

/* ═══════════════════════════════════════════════
   MODAL
═══════════════════════════════════════════════ */
.modal-overlay {
  position: fixed; inset: 0;
  background: var(--overlay);
  backdrop-filter: blur(6px);
  z-index: 200;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-overlay.open { display: flex; }
.modal-box {
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-xl);
  width: 100%; max-width: 480px;
  max-height: 92vh; overflow-y: auto;
  box-shadow: var(--shadow-lg);
  animation: modalIn .2s cubic-bezier(.4,0,.2,1);
}
@keyframes modalIn { from{opacity:0;transform:scale(.96)translateY(8px)} to{opacity:1;transform:scale(1)translateY(0)} }
@media(max-width:600px) {
  .modal-overlay { align-items: flex-end; padding: 0; }
  .modal-box { border-radius: var(--radius-xl) var(--radius-xl) 0 0; max-width: 100%; }
}
.modal-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 20px 24px 0;
}
.modal-title { font-size: 17px; font-weight: 800; }
.modal-body { padding: 20px 24px; }
.modal-footer { padding: 0 24px 24px; display: flex; gap: 10px; }
.modal-field { margin-bottom: 14px; }
.modal-label { display: block; font-size: 11px; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
.chip-row { display: flex; gap: 6px; flex-wrap: wrap; }
.chip {
  padding: 6px 12px; border-radius: var(--radius-sm);
  border: 1px solid var(--border); background: var(--bg-3);
  font-size: 12px; font-weight: 600; color: var(--text-2);
  cursor: pointer; transition: all var(--transition);
}
.chip.active { border-color: var(--accent); background: rgba(22,163,74,.08); color: var(--accent-light); }

/* ═══════════════════════════════════════════════
   SECTION HEADERS
═══════════════════════════════════════════════ */
.section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.section-title { font-size: 13px; font-weight: 700; color: var(--text-2); text-transform: uppercase; letter-spacing: 0.5px; }
.page-header { margin-bottom: 24px; }
.page-title { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }
.page-subtitle { font-size: 14px; color: var(--text-3); margin-top: 4px; }

/* ═══════════════════════════════════════════════
   RESPONSIVE
═══════════════════════════════════════════════ */
@media(max-width: 768px) {
  .sidebar { display: none; }
  .mobile-topbar { display: flex; }
  .bottom-nav { display: block; }
  .content { padding: 16px; padding-bottom: 100px; }
  .topbar { display: none; }
}
@media(min-width: 769px) {
  .mobile-topbar { display: none; }
  .bottom-nav { display: none; }
}

/* FADE IN */
.fade { animation: fadeUp .25s ease; }
@keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

/* EMPTY STATE */
.empty { text-align: center; padding: 48px 24px; color: var(--text-3); }
.empty-icon { font-size: 40px; margin-bottom: 12px; opacity: .4; }
.empty-text { font-size: 14px; }
</style>

<script>
// ══════════════════════════════════════════════════════
// CONFIG

const API = 'https://portfolio-api-j1go.vercel.app';
const REFRESH_MS = 30000;

// ══════════════════════════════════════════════════════
// DONNÉES
// ══════════════════════════════════════════════════════
const DEFAULT = {
  pea: { id:'pea', label:'PEA', platform:'Trade Republic', color:'#16A34A', holdings:[

    {id:'3',name:'MSCI Emerging Markets ESG',isin:'FR0013412020',ticker:'PAEEM.PA',type:'ETF',qty:4,invested:126,current:126,monthly:60},
  ]},
  cto: { id:'cto', label:'CTO', platform:'Trade Republic', color:'#DC2626', holdings:[
    {id:'4',name:'Xiaomi',isin:'KYG9830T1067',ticker:'1810.HK',type:'Action',qty:13.91,invested:34,current:34,monthly:0},
    {id:'5',name:'Sylvania Platinum',isin:'BMG864081044',ticker:'SLP.L',type:'Action',qty:10.29,invested:23,current:23,monthly:0},
    {id:'9',name:'Commodity ex-Agriculture',isin:'LU1829218749',ticker:'LYTR.DE',type:'ETF',qty:0.69,invested:24,current:24,monthly:10},
  ]},

    {id:'6',name:'Amundi MSCI World Swap II',isin:'FR0010315770',ticker:'WLD.PA',type:'ETF',qty:0.96,invested:350,current:350,monthly:120},
    {id:'7',name:'Fonds Euro Spirica NG',isin:'FONDSEURNG',ticker:null,type:'Fonds',qty:null,invested:150,current:150,monthly:30},
  ]},
  pee: { id:'pee', label:'PEE', platform:'Natixis', color:'#2563EB', holdings:[
    {id:'8',name:'Avenir Diversifié I',isin:'—',ticker:null,type:'Fonds',qty:null,invested:764.93,current:764.93,monthly:0},

const SCENARIOS = [
  {label:'Pessimiste',rate:.05,color:'#DC2626'},

];

// ══════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════

let page = 'dashboard';

let simM, simY = 15;
let alerts = JSON.parse(localStorage.getItem('al')||'[]');

let lastUpdate = null;

// ══════════════════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════════════════
const eur = n => new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR',maximumFractionDigits:0}).format(n);
const eurD = n => new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR',minimumFractionDigits:2,maximumFractionDigits:2}).format(n);
const tot = h => h.reduce((s,x)=>s+(x.current||0),0);
const inv = h => h.reduce((s,x)=>s+(x.invested||0),0);
const mon = p => Object.values(p).reduce((s,a)=>s+a.holdings.reduce((ss,h)=>ss+(h.monthly||0),0),0);
const fv = (m,y,r) => { const n=y*12,rt=r/12; return rt===0?m*n:m*((Math.pow(1+rt,n)-1)/rt)*(1+rt); };
const genId = () => Date.now().toString(36)+Math.random().toString(36).slice(2,5);
const hhmm = d => `${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
const sign = n => n>=0?'+':'';
const colorPnl = n => n>=0?'var(--accent-light)':'var(--danger-light)';
function badgePnl(n,pct){
  const cl=n>=0?'badge-green':'badge-red';
  return `<span class="badge ${cl}">${sign(n)}${eur(n)} (${sign(pct)}${pct.toFixed(2)}%)</span>`;
}

function loadP(){try{const v=localStorage.getItem('pf_version');if(v!=='v6'){localStorage.removeItem('pf');localStorage.setItem('pf_version','v6');}const s=localStorage.getItem('pf');if(s)return JSON.parse(s);}catch(_){}return JSON.parse(JSON.stringify(DEFAULT));}
function saveP(){localStorage.setItem('pf',JSON.stringify(P));}

// ══════════════════════════════════════════════════════
// THEME
// ══════════════════════════════════════════════════════
function applyTheme(){

const PAGE_TITLES = {dashboard:'Tableau de bord',portefeuille:'Portefeuille',simulation:'Simulation',alertes:'Alertes',edit:'Modifier',detail:'Détail'};

function goTo(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.bottom-nav-item').forEach(b=>b.classList.remove('active'));

  const pg = document.getElementById(`page-${name}`);
  if(pg){pg.classList.add('active');pg.classList.add('fade');setTimeout(()=>pg.classList.remove('fade'),300);}

  const navEl = document.getElementById(`nav-${name}`);
  const bnavEl = document.getElementById(`bnav-${name}`);
  if(navEl) navEl.classList.add('active');
  if(bnavEl) bnavEl.classList.add('active');

  const title = PAGE_TITLES[name]||'';
  document.getElementById('topbar-title').textContent = title;
  document.getElementById('mobile-title').textContent = title;
  document.getElementById('content').scrollTop = 0;
  page = name;

  if(name==='dashboard') renderDash();
  if(name==='portefeuille') renderPort();
  if(name==='simulation') renderSim();
  if(name==='alertes') renderAlerts();
  if(name==='edit') renderEdit();
}

function setStatus(s){
  ['live-dot','live-dot-m'].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.className='live-dot'+(s==='loading'?' loading':s==='error'?' error':'');
  });
  const txt=document.getElementById('live-text');
  const sb=document.getElementById('sb-live-text');
  const msg = s==='loading'?'Mise à jour...' : s==='error'?'Hors ligne' : lastUpdate?`${hhmm(lastUpdate)}`:'En direct';
  if(txt) txt.textContent = s==='loading'?'Mise à jour...' : s==='error'?'Hors ligne' : lastUpdate?`Mis à jour ${hhmm(lastUpdate)}`:'En direct';
  if(sb) sb.textContent = msg;
}

// FETCH LIVE
// ══════════════════════════════════════════════════════
async function fetchLive(){
  const tickers=[...new Set(Object.values(P).flatMap(a=>a.holdings.map(h=>h.ticker)).filter(Boolean))];
  if(!tickers.length) return;
  setStatus('loading');
  try{
    const res=await fetch(`${API}/api/quote?symbols=${encodeURIComponent(tickers.join(','))}`);
    const json=await res.json();
    if(!json.success) throw new Error();
    Object.values(P).forEach(acc=>acc.holdings.forEach(h=>{
      if(!h.ticker||!json.data[h.ticker]||json.data[h.ticker].error) return;
      const p=json.data[h.ticker];
      if(h.qty) h.current=+(h.qty*p.price).toFixed(2);
      h.marketData={price:p.price,change:p.change,changePercent:p.changePercent,currency:'EUR'};
    }));
    saveP(); lastUpdate=new Date(); setStatus('live');
    if(page==='dashboard') renderDash();
    if(page==='portefeuille') renderPort();
    if(page==='detail'&&detail) updateDetailPrice();
  }catch(e){ setStatus('error'); }
}
function startRefresh(){ fetchLive(); clearInterval(refreshTimer); refreshTimer=setInterval(fetchLive,REFRESH_MS); }

  if(detail) loadChart(detail.h.ticker, p, detail.acc.color);

async function loadChart(ticker, p, color){
  const ca=document.getElementById('chart-area');
  if(!ca) return;
  try{
    const map={'1d':'5m,1d','1wk':'1h,5d','1mo':'1d,1mo','6mo':'1wk,6mo','1y':'1wk,1y','5y':'1mo,5y'};
    const [iv,rg]=map[p].split(',');
    const res=await fetch(`${API}/api/quote?ticker=${encodeURIComponent(ticker)}&interval=${iv}&range=${rg}`);
    const json=await res.json();
    if(json.error||!json.data||json.data.length<2){ca.innerHTML='<div class="chart-loading">Données non disponibles</div>';return;}
    drawChart(json.data, color);
  }catch(e){ca.innerHTML='<div class="chart-loading">Erreur de connexion</div>';}
}

function drawChart(data, color){
  const ca=document.getElementById('chart-area');
  const cf=document.getElementById('chart-footer');
  if(!ca) return;

  const W=ca.offsetWidth||340, H=220;
  const P2={t:16,b:28,l:4,r:62};
  const prices=data.map(d=>d.price);
  const minP=Math.min(...prices), maxP=Math.max(...prices), rng=maxP-minP||1;
  const isUp=prices[prices.length-1]>=prices[0];
  const lc=isUp?'#22C55E':'#EF4444';
  const x=i=>P2.l+(i/(data.length-1))*(W-P2.l-P2.r);
  const y=p=>P2.t+(H-P2.t-P2.b)-((p-minP)/rng)*(H-P2.t-P2.b);
  const line=data.map((d,i)=>`${i===0?'M':'L'}${x(i).toFixed(1)},${y(d.price).toFixed(1)}`).join(' ');
  const fill=`${line} L${x(data.length-1).toFixed(1)},${(H-P2.b).toFixed(1)} L${P2.l},${(H-P2.b).toFixed(1)} Z`;
  const yl=[minP, minP+rng*0.25, minP+rng*0.5, minP+rng*0.75, maxP];
  const gridColor=isDark?'#27272A':'#E4E4E7';
  const labelColor=isDark?'#71717A':'#A1A1AA';

  let svg=`<svg id="chart-svg" width="${W}" height="${H}" xmlns="http://www.w3.org/2000/svg" style="display:block;cursor:crosshair">
    <defs>
      <linearGradient id="cg" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${lc}" stop-opacity="${isDark?.18:.10}"/>
        <stop offset="100%" stop-color="${lc}" stop-opacity="0"/>
      </linearGradient>
      <clipPath id="clip"><rect x="${P2.l}" y="${P2.t}" width="${W-P2.l-P2.r}" height="${H-P2.t-P2.b}"/></clipPath>
    </defs>`;

  // Grid
  yl.forEach(v=>{
    const yy=y(v);
    svg+=`<line x1="${P2.l}" y1="${yy.toFixed(1)}" x2="${W-P2.r}" y2="${yy.toFixed(1)}" stroke="${gridColor}" stroke-width="1" stroke-dasharray="3,4"/>
    <text x="${W-P2.r+6}" y="${(yy+4).toFixed(1)}" fill="${labelColor}" font-size="9" font-family="monospace">${v.toFixed(2)}</text>`;
  });

  // Area + line
  svg+=`<path d="${fill}" fill="url(#cg)" clip-path="url(#clip)"/>
    <path d="${line}" stroke="${lc}" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" clip-path="url(#clip)"/>`;

  // Crosshair vertical (hidden by default)
  svg+=`<line id="tt-vline" x1="0" y1="${P2.t}" x2="0" y2="${H-P2.b}" stroke="${labelColor}" stroke-width="1" stroke-dasharray="4,3" display="none"/>`;

  // Hover dot
  svg+=`<circle id="tt-dot" cx="0" cy="0" r="5" fill="${lc}" stroke="${isDark?'#18181B':'#FFFFFF'}" stroke-width="2.5" display="none"/>`;

  // Last point dot
  svg+=`<circle cx="${x(data.length-1).toFixed(1)}" cy="${y(prices[prices.length-1]).toFixed(1)}" r="4" fill="${lc}" stroke="${isDark?'#18181B':'#FFFFFF'}" stroke-width="2"/>`;

  svg+=`</svg>`;

  // Wrapper avec tooltip
  const wrapper = document.createElement('div');
  wrapper.className = 'chart-wrapper';
  wrapper.innerHTML = svg + `<div class="chart-tooltip" id="chart-tooltip">
    <div class="tt-date" id="tt-date"></div>
    <div class="tt-price" id="tt-price"></div>
    <div class="tt-chg" id="tt-chg"></div>
  </div>`;
  ca.innerHTML = '';
  ca.appendChild(wrapper);

  // Interactions souris/touch
  const svgEl = wrapper.querySelector('#chart-svg');
  const tooltip = wrapper.querySelector('#chart-tooltip');
  const vline = wrapper.querySelector('#tt-vline');
  const dot = wrapper.querySelector('#tt-dot');
  const ttDate = wrapper.querySelector('#tt-date');
  const ttPrice = wrapper.querySelector('#tt-price');
  const ttChg = wrapper.querySelector('#tt-chg');
  const firstPrice = prices[0];

  function showTooltip(clientX){
    const rect = svgEl.getBoundingClientRect();
    const mx = clientX - rect.left;
    const chartW = W - P2.l - P2.r;
    const pct = Math.max(0, Math.min(1, (mx - P2.l) / chartW));
    const idx = Math.round(pct * (data.length - 1));
    const d = data[idx];
    if(!d) return;
    const px = x(idx), py = y(d.price);
    const chg = d.price - firstPrice;
    const chgPct = firstPrice > 0 ? chg/firstPrice*100 : 0;
    const isChgUp = chg >= 0;
    const dateStr = new Date(d.time).toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'});

    vline.setAttribute('x1', px.toFixed(1));
    vline.setAttribute('x2', px.toFixed(1));
    vline.removeAttribute('display');
    dot.setAttribute('cx', px.toFixed(1));
    dot.setAttribute('cy', py.toFixed(1));
    dot.removeAttribute('display');

    ttDate.textContent = dateStr;
    ttPrice.textContent = d.price.toFixed(3) + ' €';
    ttPrice.style.color = lc;
    ttChg.textContent = (isChgUp?'+':'') + chg.toFixed(3) + ' (' + (isChgUp?'+':'') + chgPct.toFixed(2) + '%)';
    ttChg.style.color = isChgUp ? '#22C55E' : '#EF4444';

    tooltip.style.display = 'block';
    let left = px + 12;
    if(left + 160 > W) left = px - 160;
    let top = py - 50;
    if(top < 0) top = 4;
    tooltip.style.left = left + 'px';
    tooltip.style.top = top + 'px';
  }

  function hideTooltip(){
    tooltip.style.display = 'none';
    vline.setAttribute('display','none');
    dot.setAttribute('display','none');
  }

  svgEl.addEventListener('mousemove', e => showTooltip(e.clientX));
  svgEl.addEventListener('mouseleave', hideTooltip);
  svgEl.addEventListener('touchmove', e => { e.preventDefault(); showTooltip(e.touches[0].clientX); }, {passive:false});
  svgEl.addEventListener('touchend', hideTooltip);

  // Footer
  if(cf){
    const chg=prices[prices.length-1]-prices[0];
    const chgPct=firstPrice>0?chg/firstPrice*100:0;
    const d1=new Date(data[0].time), d2=new Date(data[data.length-1].time);
    const fmt=d=>d.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'2-digit'});
    cf.innerHTML=`<span>${fmt(d1)} → ${fmt(d2)}</span><span style="color:${isUp?'var(--accent-light)':'var(--danger-light)'}">${sign(chg)}${chg.toFixed(3)} (${sign(chgPct)}${chgPct.toFixed(2)}%)</span>`;
  }
}

// ── CAMEMBERT ──────────────────────────────────────────
function drawPie(data, containerId){
  const el = document.getElementById(containerId);
  if(!el) return;
  const total = data.reduce((s,d)=>s+d.value,0);
  if(total<=0){el.innerHTML='<div style="color:var(--text-3);font-size:13px">Aucune donnée</div>';return;}
  const SIZE = 140, CX = SIZE/2, CY = SIZE/2, R = 58, IR = 30;
  let startAngle = -Math.PI/2;
  let paths = '', hoveredIdx = -1;

  function buildSVG(hovered=-1){
    let svgPaths = '';
    data.forEach((d,i)=>{
      const pct = d.value/total;
      const angle = pct * Math.PI * 2;
      const endAngle = startAngle + angle;
      // calc per slice
      const sa = data.slice(0,i).reduce((s,x)=>s+x.value/total*Math.PI*2,-Math.PI/2);
      const ea = sa + pct*Math.PI*2;
      const x1=CX+R*Math.cos(sa), y1=CY+R*Math.sin(sa);
      const x2=CX+R*Math.cos(ea), y2=CY+R*Math.sin(ea);
      const ix1=CX+IR*Math.cos(sa), iy1=CY+IR*Math.sin(sa);
      const ix2=CX+IR*Math.cos(ea), iy2=CY+IR*Math.sin(ea);
      const large=pct>0.5?1:0;
      const scale = hovered===i ? 1.06 : 1;
      const tx = (CX + (R+IR)/2*Math.cos((sa+ea)/2)) * (scale-1);
      const ty = (CY + (R+IR)/2*Math.sin((sa+ea)/2)) * (scale-1);
      const path = `M${ix1.toFixed(2)},${iy1.toFixed(2)} L${x1.toFixed(2)},${y1.toFixed(2)} A${R},${R} 0 ${large},1 ${x2.toFixed(2)},${y2.toFixed(2)} L${ix2.toFixed(2)},${iy2.toFixed(2)} A${IR},${IR} 0 ${large},0 ${ix1.toFixed(2)},${iy1.toFixed(2)} Z`;
      svgPaths += `<path d="${path}" fill="${d.color}" opacity="${hovered===-1||hovered===i?1:0.5}" transform="translate(${tx.toFixed(2)},${ty.toFixed(2)})" style="cursor:pointer;transition:all .2s" data-idx="${i}"/>`;
    });
    return svgPaths;
  }

  function render(hovered=-1){
    const svg = `<svg width="${SIZE}" height="${SIZE}" viewBox="0 0 ${SIZE} ${SIZE}" style="overflow:visible">${buildSVG(hovered)}</svg>`;
    el.querySelector('.pie-svg-wrap').innerHTML = svg;
    el.querySelectorAll('path[data-idx]').forEach(p=>{
      p.addEventListener('mouseenter',()=>render(+p.dataset.idx));
      p.addEventListener('mouseleave',()=>render(-1));
    });
  }

  // Legend
  const legendHtml = data.map(d=>`
    <div class="pie-legend-item">
      <div class="pie-legend-dot" style="background:${d.color}"></div>
      <span class="pie-legend-label">${d.label}</span>
      <span class="pie-legend-val">${eur(d.value)}</span>
      <span class="pie-legend-pct">${(d.value/total*100).toFixed(1)}%</span>
    </div>`).join('');

  el.innerHTML = `<div class="pie-wrapper">
    <div class="pie-svg-wrap"></div>
    <div class="pie-legend">${legendHtml}</div>
  </div>`;

  render();
}

              </div>
              <div class="slider-controls">
                <button class="s-btn" onclick="adjY(-1)">−</button>
                <div class="s-track"><div class="s-fill" style="width:${py}%;background:var(--amber)"></div></div>
                <button class="s-btn" onclick="adjY(1)">+</button>
              </div>
            </div>
            <div class="sim-total-label">Total investi : <strong>${eur(simM*simY*12)}</strong></div>
          </div>
        </div>
        <div class="card">
          <div class="card-header"><div class="card-title">Projection comparée</div></div>
          <div class="card-body">
            ${SCENARIOS.map(sc=>{
              const v=fv(simM,simY,sc.rate);

              return `<div style="display:flex;align-items:center;gap:12px;margin-bottom:14px;last-child:margin-bottom:0">

              </div>`;
            }).join('')}
          </div>
        </div>
      </div>
      <div class="sim-scenarios">
        ${SCENARIOS.map(sc=>{
          const fvV=fv(simM,simY,sc.rate);
          const iV=simM*simY*12, gain=fvV-iV, mult=iV>0?fvV/iV:1;
          return `<div class="scenario-card" style="border-left:3px solid ${sc.color}">
            <div class="sc-top">
              <div class="sc-label" style="color:${sc.color}">${sc.label}</div>

            </div>

              <div class="sc-divider"></div>

              <div class="sc-divider"></div>
              <div class="sc-stat"><div class="sc-stat-label">Multiplie</div><div class="sc-stat-value" style="color:${sc.color}">×${mult.toFixed(1)}</div></div>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>
  `;
  document.getElementById('page-simulation').innerHTML=html;
}
function adjM(d){simM=Math.max(50,Math.min(1000,simM+d));updateSim();}
function adjY(d){simY=Math.max(1,Math.min(30,simY+d));updateSim();}

function toggleAF(){const f=document.getElementById('af');if(f)f.classList.toggle('open');}
function setAT(t){
  newAT=t;
  document.getElementById('af-up')?.classList.toggle('on',t==='up');
  document.getElementById('af-dn')?.classList.toggle('on',t==='dn');
}
function addAlert(){
  const asset=document.getElementById('af-asset')?.value?.trim();
  const val=parseFloat(document.getElementById('af-val')?.value);
  if(!asset||isNaN(val)||val<=0){alert('Remplis tous les champs');return;}
  alerts.push({id:Date.now(),asset,type:newAT,value:val,active:true});
  localStorage.setItem('al',JSON.stringify(alerts));
  renderAlerts();
}
function toggleA(id){alerts=alerts.map(a=>a.id===id?{...a,active:!a.active}:a);localStorage.setItem('al',JSON.stringify(alerts));renderAlerts();}
function delAlert(id){if(!confirm('Supprimer ?'))return;alerts=alerts.filter(a=>a.id!==id);localStorage.setItem('al',JSON.stringify(alerts));renderAlerts();}

    monthly:parseFloat(document.getElementById('f-monthly').value)||0,
  };
  const acc=P[editAccId];
  const idx=acc.holdings.findIndex(x=>x.id===h.id);
  if(idx>=0)acc.holdings[idx]=h; else acc.holdings.push(h);
  saveP(); closeModal(); renderEdit();
}

function delH(accId,hId){
  if(!confirm('Supprimer cette ligne ?'))return;
  P[accId].holdings=P[accId].holdings.filter(h=>h.id!==hId);
  saveP(); renderEdit();
}

// ══════════════════════════════════════════════════════
applyTheme();
renderDash();
startRefresh();
</script>
