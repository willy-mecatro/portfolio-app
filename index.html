<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Mon Portefeuille</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    :root {
      --bg: #0A0A0F;
      --card: #12121F;
      --border: #2A2A3E;
      --border-light: #1A1A2E;
      --green: #00C896;
      --red: #FF6B6B;
      --purple: #845EF7;
      --yellow: #FFD43B;
      --blue: #4DABF7;
      --text: #FFFFFF;
      --text2: #AAAAAA;
      --muted: #555555;
      --dim: #333333;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      padding-bottom: 80px;
    }

    /* NAV BAS */
    .tab-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      max-width: 480px;
      margin: 0 auto;
      background: var(--bg);
      border-top: 1px solid var(--border-light);
      display: flex;
      z-index: 100;
    }
    .tab-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px 0 20px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--dim);
      font-size: 10px;
      gap: 4px;
    }
    .tab-btn.active { color: var(--green); }
    .tab-btn span:first-child { font-size: 22px; }

    /* PAGES */
    .page { display: none; padding: 16px; }
    .page.active { display: block; }

    /* HERO */
    .hero {
      background: linear-gradient(135deg, #0D1F2D, #0A0A0F);
      border: 1px solid #00C89633;
      border-radius: 20px;
      padding: 24px;
      text-align: center;
      margin-bottom: 16px;
    }
    .hero-label { font-size: 11px; letter-spacing: 3px; color: var(--muted); margin-bottom: 8px; }
    .hero-value { font-size: 38px; font-weight: 700; color: var(--green); margin-bottom: 10px; font-family: monospace; }
    .hero-badge {
      display: inline-block;
      border-radius: 20px;
      padding: 5px 16px;
      font-size: 13px;
      font-weight: 600;
      font-family: monospace;
    }

    /* KPI ROW */
    .kpi-row { display: flex; gap: 10px; margin-bottom: 20px; }
    .kpi-card {
      flex: 1;
      background: var(--card);
      border-radius: 14px;
      border: 1px solid var(--border-light);
      padding: 14px;
    }
    .kpi-label { font-size: 9px; letter-spacing: 1px; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; }
    .kpi-value { font-size: 16px; font-weight: 700; font-family: monospace; }
    .kpi-sub { font-size: 10px; color: var(--dim); margin-top: 3px; }

    /* SECTION TITLE */
    .section-title { font-size: 11px; letter-spacing: 2px; color: var(--muted); margin-bottom: 10px; text-transform: uppercase; }

    /* ACCOUNT CARD */
    .account-card {
      background: var(--card);
      border-radius: 16px;
      border: 1px solid var(--border-light);
      margin-bottom: 12px;
      overflow: hidden;
    }
    .account-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px;
      cursor: pointer;
    }
    .account-left { display: flex; align-items: center; gap: 12px; }
    .account-icon { font-size: 24px; }
    .account-name { font-size: 14px; font-weight: 700; }
    .account-platform { font-size: 10px; color: var(--dim); margin-top: 2px; }
    .account-right { text-align: right; }
    .account-value { font-size: 16px; font-weight: 700; font-family: monospace; }
    .account-gain { font-size: 11px; margin-top: 2px; font-family: monospace; }
    .account-chevron { font-size: 10px; color: var(--muted); margin-top: 4px; }

    /* PROGRESS BAR */
    .progress-bar { height: 6px; background: var(--bg); border-radius: 6px; margin: 0 16px 10px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 6px; transition: width 1s ease; }

    /* HOLDINGS */
    .holdings { display: none; }
    .holdings.open { display: block; }
    .holding-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 12px 16px;
      border-top: 1px solid var(--border-light);
      cursor: pointer;
      transition: background 0.2s;
    }
    .holding-row:hover { background: #ffffff08; }
    .holding-left { flex: 1; margin-right: 12px; }
    .holding-type {
      display: inline-block;
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 3px 8px;
      border-radius: 6px;
      margin-bottom: 6px;
    }
    .holding-name { font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 3px; }
    .holding-ticker { font-size: 10px; color: var(--blue); margin-top: 2px; }
    .holding-monthly { font-size: 10px; margin-top: 4px; }
    .holding-live { font-size: 11px; font-weight: 700; margin-top: 4px; font-family: monospace; }
    .holding-right { text-align: right; }
    .holding-current { font-size: 14px; font-weight: 700; font-family: monospace; }
    .holding-invested { font-size: 10px; color: var(--dim); margin-top: 3px; }
    .holding-perf { font-size: 12px; font-weight: 700; margin-top: 3px; font-family: monospace; }
    .holding-arrow { font-size: 16px; color: var(--dim); margin-top: 4px; }

    /* REFRESH BTN */
    .refresh-btn {
      width: 100%;
      background: var(--card);
      border: 1px solid #00C89644;
      border-radius: 12px;
      padding: 12px;
      color: var(--green);
      font-size: 13px;
      cursor: pointer;
      margin-bottom: 16px;
      font-family: monospace;
    }
    .refresh-btn:active { opacity: 0.7; }

    /* STATUS */
    .status-row { display: flex; align-items: center; justify-content: center; gap: 6px; padding: 8px; }
    .live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); }
    .status-text { font-size: 11px; color: var(--muted); font-family: monospace; }

    /* DETAIL PAGE */
    .detail-header { padding: 16px 0; }
    .detail-type { display: inline-block; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; padding: 4px 10px; border-radius: 6px; margin-bottom: 10px; }
    .detail-name { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .detail-ticker { font-size: 12px; color: var(--blue); margin-bottom: 4px; }
    .detail-isin { font-size: 11px; color: var(--dim); margin-bottom: 12px; }
    .detail-price { font-size: 28px; font-weight: 700; font-family: monospace; }

    /* PERIOD SELECTOR */
    .period-row { display: flex; gap: 8px; margin-bottom: 12px; }
    .period-btn {
      flex: 1;
      padding: 8px 0;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    .period-btn.active { color: var(--green); border-color: var(--green); background: #00C89622; }

    /* CHART */
    .chart-container {
      background: var(--card);
      border-radius: 16px;
      border: 1px solid var(--border);
      padding: 12px;
      margin-bottom: 16px;
      position: relative;
    }
    .chart-loading { text-align: center; padding: 60px 0; color: var(--muted); font-size: 13px; }
    canvas { width: 100% !important; }

    /* STATS */
    .stats-card { background: var(--card); border-radius: 16px; border: 1px solid var(--border); padding: 16px; }
    .stats-title { font-size: 11px; letter-spacing: 2px; color: var(--muted); margin-bottom: 14px; }
    .stat-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border-light); }
    .stat-row:last-child { border-bottom: none; }
    .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-value { font-size: 14px; font-weight: 700; font-family: monospace; }

    /* SIMULATION */
    .params-card { background: var(--card); border-radius: 20px; border: 1px solid #845EF744; padding: 20px; margin-bottom: 16px; }
    .params-title { font-size: 11px; letter-spacing: 2px; color: var(--purple); margin-bottom: 16px; }
    .slider-box { margin-bottom: 8px; }
    .slider-header { display: flex; justify-content: space-between; margin-bottom: 8px; }
    .slider-label { font-size: 13px; color: var(--text2); }
    .slider-value { font-size: 14px; font-weight: 700; font-family: monospace; }
    .slider-row { display: flex; align-items: center; gap: 10px; }
    .slider-btn {
      width: 36px; height: 36px; border-radius: 10px; border: 1px solid var(--border);
      background: var(--bg); color: var(--green); font-size: 20px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .slider-track { flex: 1; height: 6px; background: var(--bg); border-radius: 6px; overflow: hidden; }
    .slider-fill { height: 100%; border-radius: 6px; transition: width 0.3s; }
    .divider { height: 1px; background: var(--border-light); margin: 14px 0; }

    .chart-bar-container { background: var(--card); border-radius: 16px; border: 1px solid var(--border); padding: 16px; margin-bottom: 16px; }
    .bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .bar-emoji { font-size: 16px; width: 24px; }
    .bar-track { flex: 1; height: 8px; background: var(--bg); border-radius: 4px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 4px; transition: width 0.5s; }
    .bar-value { font-size: 11px; font-family: monospace; width: 80px; text-align: right; }

    .scenario-card { background: var(--card); border-radius: 16px; border: 1px solid; padding: 20px; margin-bottom: 12px; }
    .scenario-header { display: flex; justify-content: space-between; margin-bottom: 10px; }
    .scenario-label { font-size: 14px; font-weight: 700; font-family: monospace; }
    .scenario-rate { font-size: 12px; font-family: monospace; opacity: 0.7; }
    .scenario-fv { font-size: 32px; font-weight: 700; font-family: monospace; margin-bottom: 14px; }
    .scenario-stats { display: flex; background: var(--bg); border-radius: 10px; padding: 12px; gap: 1px; }
    .scenario-stat { flex: 1; text-align: center; }
    .scenario-stat-label { font-size: 9px; color: var(--dim); letter-spacing: 0.5px; margin-bottom: 4px; }
    .scenario-stat-value { font-size: 13px; font-weight: 700; font-family: monospace; color: var(--text2); }
    .scenario-divider { width: 1px; background: var(--border); }

    /* ALERTES */
    .stats-row { display: flex; gap: 10px; margin-bottom: 14px; }
    .stat-card { flex: 1; background: var(--card); border-radius: 14px; border: 1px solid; padding: 14px; text-align: center; }
    .stat-num { font-size: 24px; font-weight: 700; font-family: monospace; }
    .stat-lbl { font-size: 9px; color: var(--dim); letter-spacing: 1px; margin-top: 4px; }
    .add-btn { width: 100%; background: var(--yellow); border: none; border-radius: 14px; padding: 14px; color: #000; font-size: 14px; font-weight: 700; cursor: pointer; margin-bottom: 14px; }
    
    .alert-form { background: var(--card); border-radius: 20px; border: 1px solid #FFD43B44; padding: 20px; margin-bottom: 16px; display: none; }
    .alert-form.open { display: block; }
    .form-title { font-size: 11px; letter-spacing: 2px; color: var(--yellow); margin-bottom: 14px; }
    .form-input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; color: var(--text); font-size: 13px; margin-bottom: 10px; outline: none; }
    .type-row { display: flex; gap: 10px; margin-bottom: 10px; }
    .type-btn { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 12px; text-align: center; cursor: pointer; font-size: 12px; color: var(--muted); }
    .type-btn.above.active { border-color: var(--green); background: #00C89611; color: var(--green); }
    .type-btn.below.active { border-color: var(--red); background: #FF6B6B11; color: var(--red); }
    .submit-btn { width: 100%; background: var(--green); border: none; border-radius: 12px; padding: 14px; color: #000; font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 4px; }

    .alert-card { background: var(--card); border-radius: 14px; border: 1px solid; padding: 14px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
    .alert-icon-bg { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 700; margin-right: 12px; flex-shrink: 0; }
    .alert-asset { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
    .alert-condition { font-size: 11px; font-family: monospace; }
    .alert-actions { display: flex; align-items: center; gap: 10px; }
    .toggle { width: 40px; height: 22px; border-radius: 11px; background: var(--border); position: relative; cursor: pointer; transition: background 0.2s; border: none; }
    .toggle.on { background: var(--green); }
    .toggle::after { content: ''; width: 16px; height: 16px; border-radius: 50%; background: #fff; position: absolute; top: 3px; left: 3px; transition: left 0.2s; }
    .toggle.on::after { left: 21px; }
    .delete-btn { background: none; border: none; color: var(--muted); font-size: 16px; cursor: pointer; padding: 4px; }

    /* EDIT */
    .edit-btn-top { width: 100%; background: var(--card); border: 1px solid #FFD43B66; border-radius: 14px; padding: 14px; color: var(--yellow); font-size: 14px; font-weight: 700; cursor: pointer; margin-bottom: 8px; }
    .hint { font-size: 11px; color: var(--dim); text-align: center; margin-bottom: 12px; }

    /* MODAL */
    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #000000AA; z-index: 200; display: none; align-items: flex-end; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal-content { background: var(--card); border-radius: 24px 24px 0 0; padding: 20px; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; }
    .modal-title { font-size: 18px; font-weight: 700; text-align: center; margin-bottom: 16px; }
    .field-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; margin-top: 12px; display: block; }
    .modal-btns { display: flex; gap: 10px; margin-top: 16px; }
    .modal-cancel { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 12px; padding: 14px; color: var(--muted); font-size: 14px; cursor: pointer; }
    .modal-save { flex: 2; border: none; border-radius: 12px; padding: 14px; color: #000; font-size: 14px; font-weight: 700; cursor: pointer; }

    /* BACK BTN */
    .back-btn { background: none; border: none; color: var(--green); font-size: 14px; cursor: pointer; padding: 8px 0; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }

    .loading-spinner { text-align: center; padding: 40px; color: var(--muted); font-size: 24px; }
  </style>
</head>
<body>

<!-- PAGES -->
<div id="page-dashboard" class="page active"></div>
<div id="page-portefeuille" class="page"></div>
<div id="page-detail" class="page"></div>
<div id="page-simulation" class="page"></div>
<div id="page-alertes" class="page"></div>

<!-- TAB BAR -->
<div class="tab-bar">
  <button class="tab-btn active" onclick="showPage('dashboard')">
    <span>🏠</span><span>Accueil</span>
  </button>
  <button class="tab-btn" onclick="showPage('portefeuille')">
    <span>💼</span><span>Portefeuille</span>
  </button>
  <button class="tab-btn" onclick="showPage('simulation')">
    <span>📊</span><span>Simulation</span>
  </button>
  <button class="tab-btn" onclick="showPage('alertes')">
    <span>🔔</span><span>Alertes</span>
  </button>
</div>

<!-- MODAL EDIT -->
<div class="modal-overlay" id="modal">
  <div class="modal-content">
    <div class="modal-title" id="modal-title">✏️ Modifier</div>
    <label class="field-label">Nom *</label>
    <input class="form-input" id="f-name" placeholder="Ex: Nasdaq 100">
    <label class="field-label">ISIN</label>
    <input class="form-input" id="f-isin" placeholder="Ex: FR0011871110">
    <label class="field-label">Ticker Yahoo Finance</label>
    <input class="form-input" id="f-ticker" placeholder="Ex: PUST.PA">
    <label class="field-label">Type</label>
    <div class="type-row" id="type-row">
      <button class="type-btn above active" onclick="selectType('ETF')">ETF</button>
      <button class="type-btn above" onclick="selectType('Action')">Action</button>
      <button class="type-btn above" onclick="selectType('Fonds €')">Fonds €</button>
      <button class="type-btn above" onclick="selectType('Crypto')">Crypto</button>
    </div>
    <label class="field-label">Montant investi (€)</label>
    <input class="form-input" id="f-invested" type="number" placeholder="Ex: 250">
    <label class="field-label">Valeur actuelle (€)</label>
    <input class="form-input" id="f-current" type="number" placeholder="Ex: 270">
    <label class="field-label">Quantité (optionnel)</label>
    <input class="form-input" id="f-qty" type="number" placeholder="Ex: 10">
    <label class="field-label">Versement mensuel (€)</label>
    <input class="form-input" id="f-monthly" type="number" placeholder="Ex: 50" value="0">
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal()">Annuler</button>
      <button class="modal-save" id="modal-save-btn" onclick="saveHolding()">✓ Enregistrer</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
// DONNÉES
// ═══════════════════════════════════════════════
const DEFAULT_PORTFOLIO = {
  pea: {
    id: 'pea', label: 'PEA', platform: 'Trade Republic', color: '#00C896', icon: '📈',
    holdings: [
      { id: '1', name: 'Nasdaq 100', isin: 'FR0011871110', ticker: 'PUST.PA', type: 'ETF', qty: null, invested: 85, current: 85.2, monthly: 85 },
      { id: '2', name: 'Stoxx Europe 600', isin: '—', ticker: 'MSE.PA', type: 'ETF', qty: null, invested: 40, current: 39.8, monthly: 40 },
      { id: '3', name: 'MSCI Emerging Markets ESG', isin: 'FR0013412020', ticker: 'PAEEM.PA', type: 'ETF', qty: null, invested: 60, current: 62.1, monthly: 60 },
    ]
  },
  cto: {
    id: 'cto', label: 'CTO', platform: 'Trade Republic', color: '#FF6B6B', icon: '💹',
    holdings: [
      { id: '4', name: 'Xiaomi', isin: 'KYG9830T1067', ticker: '1810.HK', type: 'Action', qty: 10, invested: 136, current: 118, monthly: 0 },
      { id: '5', name: 'Sylvania Platinum', isin: 'BMG864081044', ticker: 'SLP.L', type: 'Action', qty: 20, invested: 272, current: 188, monthly: 0 },
    ]
  },
  av: {
    id: 'av', label: 'Assurance Vie', platform: 'Linxea Spirit 2', color: '#845EF7', icon: '🛡️',
    holdings: [
      { id: '6', name: 'Amundi MSCI World Swap II', isin: 'FR0010315770', ticker: 'WLD.PA', type: 'ETF', qty: null, invested: 349.97, current: 349.94, monthly: 120 },
      { id: '7', name: 'Fonds Euro Spirica NG', isin: 'FONDSEURNG', ticker: null, type: 'Fonds €', qty: null, invested: 150, current: 150, monthly: 30 },
    ]
  }
};

const API_URL = 'https://portfolio-api-j1go.vercel.app';
const SCENARIOS = [
  { label: 'Pessimiste', rate: 0.05, color: '#FF6B6B', emoji: '📉' },
  { label: 'Moyen', rate: 0.10, color: '#FFD43B', emoji: '📊' },
  { label: 'Optimiste', rate: 0.15, color: '#00C896', emoji: '🚀' },
];

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let portfolio = loadPortfolio();
let currentPage = 'dashboard';
let currentDetail = null;
let editingHolding = null;
let editingAccId = null;
let alertType = 'above';
let simMonthly = calcMonthly(portfolio);
let simYears = 15;
let alerts = JSON.parse(localStorage.getItem('alerts') || '[{"id":1,"asset":"Sylvania Platinum","type":"above","value":1.20,"active":true},{"id":2,"asset":"Xiaomi","type":"below","value":2.00,"active":true}]');

// ═══════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════
function fmtEur(n) {
  return new Intl.NumberFormat('fr-FR', { style: 'currency', currency: 'EUR', maximumFractionDigits: 0 }).format(n);
}
function fmtEurDec(n) {
  return new Intl.NumberFormat('fr-FR', { style: 'currency', currency: 'EUR', minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(n);
}
function calcTotal(holdings) { return holdings.reduce((s, h) => s + (h.current || 0), 0); }
function calcInvested(holdings) { return holdings.reduce((s, h) => s + (h.invested || 0), 0); }
function calcMonthly(p) { return Object.values(p).reduce((s, acc) => s + acc.holdings.reduce((ss, h) => ss + (h.monthly || 0), 0), 0); }
function fv(monthly, years, rate) {
  const n = years * 12, r = rate / 12;
  if (r === 0) return monthly * n;
  return monthly * ((Math.pow(1 + r, n) - 1) / r) * (1 + r);
}
function genId() { return Date.now().toString(); }

function loadPortfolio() {
  try { const s = localStorage.getItem('portfolio'); if (s) return JSON.parse(s); } catch(_) {}
  return JSON.parse(JSON.stringify(DEFAULT_PORTFOLIO));
}
function savePortfolio() { localStorage.setItem('portfolio', JSON.stringify(portfolio)); }

// ═══════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  
  if (name === 'detail') {
    document.getElementById('page-detail').classList.add('active');
  } else {
    document.getElementById(`page-${name}`).classList.add('active');
    const tabs = ['dashboard','portefeuille','simulation','alertes'];
    const idx = tabs.indexOf(name);
    if (idx >= 0) document.querySelectorAll('.tab-btn')[idx].classList.add('active');

}

async function loadChart(ticker, period, color) {
  try {
    const map = {'1d':'5m,1d','1wk':'1h,5d','1mo':'1d,1mo','6mo':'1wk,6mo','1y':'1wk,1y','5y':'1mo,5y'};
    const [interval, range] = map[period].split(',');
    const url = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(ticker)}?interval=${interval}&range=${range}`;
    const res = await fetch(url, { headers: { 'User-Agent': 'Mozilla/5.0' } });
    const json = await res.json();
    const result = json?.chart?.result?.[0];
    if (!result) { document.getElementById('chart-area').innerHTML = '<div class="chart-loading">Pas de données</div>'; return; }

    const timestamps = result.timestamp || [];
    const closes = result.indicators?.quote?.[0]?.close || [];
    const data = timestamps.map((t, i) => ({ time: t * 1000, price: closes[i] })).filter(d => d.price != null);

    if (data.length < 2) { document.getElementById('chart-area').innerHTML = '<div class="chart-loading">Données insuffisantes</div>'; return; }

    drawChart(data, color);
  } catch(e) {
    document.getElementById('chart-area').innerHTML = '<div class="chart-loading">Erreur de chargement</div>';
  }
}

function drawChart(data, color) {
  const W = document.getElementById('chart-area').offsetWidth || 300;
  const H = 200;
  const PAD = { top: 20, bottom: 30, left: 8, right: 50 };

  const prices = data.map(d => d.price);
  const minP = Math.min(...prices);
  const maxP = Math.max(...prices);
  const range = maxP - minP || 1;
  const isUp = prices[prices.length-1] >= prices[0];
  const lineColor = isUp ? '#00C896' : '#FF6B6B';

  const toX = i => PAD.left + (i / (data.length - 1)) * (W - PAD.left - PAD.right);
  const toY = p => PAD.top + (H - PAD.top - PAD.bottom) - ((p - minP) / range) * (H - PAD.top - PAD.bottom);

  // SVG
  const pts = data.map((d, i) => `${toX(i)},${toY(d.price)}`).join(' ');
  const linePts = data.map((d, i) => `${i===0?'M':'L'} ${toX(i)} ${toY(d.price)}`).join(' ');
  const fillPts = `${linePts} L ${toX(data.length-1)} ${H-PAD.bottom} L ${PAD.left} ${H-PAD.bottom} Z`;

  const lastX = toX(data.length-1);
  const lastY = toY(prices[prices.length-1]);

  const yLabels = [minP, (minP+maxP)/2, maxP];

  let svg = `<svg width="${W}" height="${H}" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${lineColor}" stop-opacity="0.3"/>
        <stop offset="100%" stop-color="${lineColor}" stop-opacity="0"/>
      </linearGradient>
    </defs>`;

  yLabels.forEach(v => {
    const y = toY(v);
    svg += `<line x1="${PAD.left}" y1="${y}" x2="${W-PAD.right}" y2="${y}" stroke="#1A1A2E" stroke-width="1" stroke-dasharray="4,4"/>
    <text x="${W-PAD.right+4}" y="${y+4}" fill="#555" font-size="9">${v.toFixed(1)}</text>`;
  });

  svg += `<path d="${fillPts}" fill="url(#g)"/>
    <path d="${linePts}" stroke="${lineColor}" stroke-width="2" fill="none" stroke-linejoin="round"/>
    <circle cx="${lastX}" cy="${lastY}" r="4" fill="${lineColor}"/>
  </svg>`;

  document.getElementById('chart-area').innerHTML = svg;
}

            <div class="scenario-stat"><div class="scenario-stat-label">INVESTI</div><div class="scenario-stat-value">${fmtEur(inv)}</div></div>
            <div class="scenario-divider"></div>
            <div class="scenario-stat"><div class="scenario-stat-label">GAINS</div><div class="scenario-stat-value" style="color:${sc.color}">+${fmtEur(gain)}</div></div>
            <div class="scenario-divider"></div>
            <div class="scenario-stat"><div class="scenario-stat-label">×MULT</div><div class="scenario-stat-value" style="color:${sc.color}">×${mult.toFixed(1)}</div></div>
          </div>
        </div>`;
    }).join('')}
  `;

  document.getElementById('page-simulation').innerHTML = html;
}

function changeMonthly(d) { simMonthly = Math.max(50, Math.min(1000, simMonthly + d)); updateSimulation(); }
function changeYears(d) { simYears = Math.max(1, Math.min(30, simYears + d)); updateSimulation(); }

// ═══════════════════════════════════════════════
// ALERTES
// ═══════════════════════════════════════════════
let newAlertType = 'above';

function renderAlertes() {
  const active = alerts.filter(a => a.active).length;
  let html = `
    <h2 style="color:#fff;font-size:22px;font-weight:700;margin-bottom:12px">Alertes</h2>
    <div class="stats-row">
      <div class="stat-card" style="border-color:#FFD43B44">
        <div class="stat-num" style="color:#FFD43B">${alerts.length}</div>
        <div class="stat-lbl">ALERTES</div>
      </div>
      <div class="stat-card" style="border-color:#00C89644">
        <div class="stat-num" style="color:#00C896">${active}</div>
        <div class="stat-lbl">ACTIVES</div>
      </div>
    </div>
    <button class="add-btn" onclick="toggleAlertForm()">+ Nouvelle alerte</button>
    <div class="alert-form" id="alert-form">
      <div class="form-title">NOUVELLE ALERTE</div>
      <input class="form-input" id="alert-asset" placeholder="Nom de l'actif (ex: Xiaomi)">
      <div class="type-row">
        <button class="type-btn above active" id="btn-above" onclick="setAlertType('above')">▲ Au-dessus de</button>
        <button class="type-btn below" id="btn-below" onclick="setAlertType('below')">▼ En-dessous de</button>
      </div>
      <input class="form-input" id="alert-value" type="number" placeholder="Prix cible en €">
      <button class="submit-btn" onclick="addAlert()">✓ Créer l'alerte</button>
    </div>
    <div class="section-title">MES ALERTES</div>
  `;

  if (alerts.length === 0) {
    html += `<div style="text-align:center;padding:40px;color:var(--muted)"><div style="font-size:48px">🔕</div><div style="margin-top:12px">Aucune alerte</div></div>`;
  } else {
    alerts.forEach(a => {
      const color = a.type === 'above' ? '#00C896' : '#FF6B6B';
      html += `
        <div class="alert-card" style="border-color:${a.active?color+'44':'var(--border)'};opacity:${a.active?1:0.5}">
          <div style="display:flex;align-items:center;flex:1">
            <div class="alert-icon-bg" style="background:${color}22;color:${color}">${a.type==='above'?'▲':'▼'}</div>
            <div>
              <div class="alert-asset">${a.asset}</div>
              <div class="alert-condition" style="color:${color}">${a.type==='above'?'Au-dessus de':'En-dessous de'} ${a.value} €</div>
            </div>
          </div>
          <div class="alert-actions">
            <button class="toggle ${a.active?'on':''}" onclick="toggleAlrt(${a.id})"></button>
            <button class="delete-btn" onclick="deleteAlrt(${a.id})">✕</button>
          </div>
        </div>`;
    });
  }

  document.getElementById('page-alertes').innerHTML = html;
}

function toggleAlertForm() {
  const f = document.getElementById('alert-form');
  if (f) f.classList.toggle('open');
}
function setAlertType(t) {
  newAlertType = t;
  document.getElementById('btn-above')?.classList.toggle('active', t==='above');
  document.getElementById('btn-below')?.classList.toggle('active', t==='below');
}
function addAlert() {
  const asset = document.getElementById('alert-asset')?.value?.trim();
  const val = parseFloat(document.getElementById('alert-value')?.value);
  if (!asset || isNaN(val) || val <= 0) { alert('Remplis tous les champs correctement'); return; }
  alerts.push({ id: Date.now(), asset, type: newAlertType, value: val, active: true });
  localStorage.setItem('alerts', JSON.stringify(alerts));
  renderAlertes();
}
function toggleAlrt(id) {
  alerts = alerts.map(a => a.id === id ? {...a, active: !a.active} : a);
  localStorage.setItem('alerts', JSON.stringify(alerts));
  renderAlertes();
}
function deleteAlrt(id) {
  if (!confirm('Supprimer cette alerte ?')) return;
  alerts = alerts.filter(a => a.id !== id);
  localStorage.setItem('alerts', JSON.stringify(alerts));
  renderAlertes();
}

// ═══════════════════════════════════════════════
// COURS EN TEMPS RÉEL
// ═══════════════════════════════════════════════
async function fetchLivePrices() {
  const statusEl = document.getElementById('status-row');
  if (statusEl) statusEl.innerHTML = '<span style="color:#FFD43B;font-size:12px">⟳ Mise à jour en cours...</span>';

  const tickers = [];
  Object.values(portfolio).forEach(acc => acc.holdings.forEach(h => { if (h.ticker) tickers.push(h.ticker); }));
  
  if (tickers.length === 0) return;

  try {
    const res = await fetch(`${API_URL}/api/quote?symbols=${encodeURIComponent([...new Set(tickers)].join(','))}`);
    const json = await res.json();
    if (!json.success) return;

    Object.values(portfolio).forEach(acc => {
      acc.holdings.forEach(h => {
        if (!h.ticker || !json.data[h.ticker] || json.data[h.ticker].error) return;
        const p = json.data[h.ticker];
        if (h.qty) h.current = +(h.qty * p.price).toFixed(2);
        h.marketData = { price: p.price, change: p.change, changePercent: p.changePercent, currency: p.currency };
      });
    });

    savePortfolio();
    const now = new Date();
    const time = `${now.getHours()}h${String(now.getMinutes()).padStart(2,'0')}`;
    if (statusEl) statusEl.innerHTML = `<div class="live-dot"></div><span class="status-text">Mis à jour à ${time}</span>`;
    renderDashboard();
  } catch(e) {
    if (statusEl) statusEl.innerHTML = '<span style="color:#FF6B6B;font-size:12px">⚠️ Erreur de connexion</span>';
  }
}
