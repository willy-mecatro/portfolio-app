<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#060608">
<title>Portfolio</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#060608;
  --bg2:#0D0D14;
  --card:#111118;
  --card2:#16161F;
  --border:#1E1E2A;
  --green:#00E5A0;
  --red:#FF5C7A;
  --blue:#4D9EFF;
  --purple:#9B6DFF;
  --yellow:#FFD060;
  --text:#F0F0F8;
  --text2:#8888AA;
  --dim:#3A3A50;
}
html,body{height:100%;overflow:hidden}
body{
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;
  display:flex;flex-direction:column;
  max-width:480px;margin:0 auto;
  position:relative;
}

/* HEADER */
.header{
  padding:16px 20px 12px;
  display:flex;justify-content:space-between;align-items:center;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.header-title{font-size:18px;font-weight:700;letter-spacing:-0.5px}
.live-indicator{
  display:flex;align-items:center;gap:6px;
  font-size:11px;color:var(--text2);
}
.live-dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--green);
  box-shadow:0 0 8px var(--green);
  animation:pulse 2s infinite;
}
.live-dot.loading{background:var(--yellow);box-shadow:0 0 8px var(--yellow)}
.live-dot.error{background:var(--red);box-shadow:0 0 8px var(--red);animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

/* SCROLL AREA */
.scroll{flex:1;overflow-y:auto;padding-bottom:80px}
.scroll::-webkit-scrollbar{display:none}

/* BOTTOM NAV */
.nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;
  background:rgba(6,6,8,0.95);
  backdrop-filter:blur(20px);
  border-top:1px solid var(--border);
  display:flex;z-index:100;
  padding-bottom:env(safe-area-inset-bottom);
}
.nav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;
  padding:10px 0 12px;background:none;border:none;cursor:pointer;
  color:var(--dim);font-size:10px;gap:5px;transition:color 0.2s;
}
.nav-btn.active{color:var(--green)}
.nav-icon{font-size:20px;transition:transform 0.2s}
.nav-btn.active .nav-icon{transform:scale(1.1)}

/* PAGES */
.page{display:none;padding:0}
.page.active{display:block}

/* ── DASHBOARD ── */
.patrimoine-card{
  margin:16px;
  background:linear-gradient(135deg,#0A1628,#0D0D14);
  border:1px solid #1A2840;
  border-radius:24px;padding:28px 24px;text-align:center;
  position:relative;overflow:hidden;
}
.patrimoine-card::before{
  content:'';position:absolute;
  top:-60px;right:-60px;
  width:200px;height:200px;
  background:radial-gradient(circle,#00E5A015,transparent 70%);
  border-radius:50%;
}
.patrimoine-label{font-size:11px;letter-spacing:3px;color:var(--text2);margin-bottom:6px;text-transform:uppercase}
.patrimoine-value{
  font-size:44px;font-weight:800;
  background:linear-gradient(135deg,#00E5A0,#4D9EFF);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  letter-spacing:-2px;line-height:1.1;margin-bottom:10px;
}
.patrimoine-change{
  display:inline-flex;align-items:center;gap:6px;
  padding:6px 14px;border-radius:20px;font-size:13px;font-weight:600;
}
.last-update{font-size:10px;color:var(--dim);margin-top:10px}

/* MINI STATS */
.mini-stats{display:flex;gap:10px;padding:0 16px;margin-bottom:16px}
.mini-stat{
  flex:1;background:var(--card);border-radius:16px;
  border:1px solid var(--border);padding:14px 12px;
}
.mini-stat-label{font-size:9px;letter-spacing:1px;color:var(--text2);text-transform:uppercase;margin-bottom:6px}
.mini-stat-value{font-size:18px;font-weight:700;letter-spacing:-0.5px}
.mini-stat-sub{font-size:10px;color:var(--dim);margin-top:3px}

/* SECTION */
.section-label{font-size:10px;letter-spacing:2px;color:var(--text2);text-transform:uppercase;padding:0 20px;margin-bottom:10px}

/* ACCOUNT CARDS */
.account-card{
  background:var(--card);
  border-radius:20px;border:1px solid var(--border);
  margin:0 16px 12px;overflow:hidden;
  transition:border-color 0.3s;
}
.account-card:hover{border-color:var(--border)}
.account-header{
  display:flex;justify-content:space-between;align-items:center;
  padding:16px 18px;cursor:pointer;
}
.acc-left{display:flex;align-items:center;gap:12px}
.acc-icon{
  width:42px;height:42px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;font-size:20px;
}
.acc-name{font-size:15px;font-weight:700;letter-spacing:-0.3px}
.acc-platform{font-size:11px;color:var(--text2);margin-top:2px}
.acc-right{text-align:right}
.acc-value{font-size:18px;font-weight:800;letter-spacing:-0.5px}
.acc-gain{font-size:12px;margin-top:3px;font-weight:600}
.acc-chevron{font-size:10px;color:var(--dim);margin-top:3px;transition:transform 0.3s}
.acc-chevron.open{transform:rotate(180deg)}

/* PROGRESS */
.acc-progress{height:3px;background:var(--border);margin:0 18px 12px}
.acc-progress-fill{height:100%;border-radius:2px;transition:width 1.5s ease}

/* HOLDINGS */
.holdings-list{border-top:1px solid var(--border)}
.holding-item{
  display:flex;justify-content:space-between;align-items:center;
  padding:14px 18px;border-bottom:1px solid var(--border);
  cursor:pointer;transition:background 0.2s;position:relative;
}
.holding-item:last-child{border-bottom:none}
.holding-item:hover{background:#ffffff05}
.holding-item:active{background:#ffffff08}
.h-left{flex:1;min-width:0}
.h-type{
  display:inline-block;font-size:9px;font-weight:700;text-transform:uppercase;
  letter-spacing:1px;padding:2px 7px;border-radius:5px;margin-bottom:5px;
}
.h-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.h-ticker{font-size:10px;color:var(--blue);margin-top:2px}
.h-monthly{font-size:10px;margin-top:3px}
.h-live{font-size:11px;font-weight:700;margin-top:3px;font-family:monospace}
.h-right{text-align:right;flex-shrink:0;margin-left:12px}
.h-current{font-size:15px;font-weight:800;letter-spacing:-0.3px}
.h-invested{font-size:10px;color:var(--text2);margin-top:2px}
.h-perf{font-size:12px;font-weight:700;margin-top:2px}
.h-arrow{font-size:14px;color:var(--dim);margin-top:3px}

/* TICKER TAPE */
.ticker-tape{
  background:var(--bg2);border-top:1px solid var(--border);border-bottom:1px solid var(--border);
  padding:10px 0;margin-bottom:16px;overflow:hidden;white-space:nowrap;
}
.ticker-inner{display:inline-flex;gap:32px;animation:scroll 30s linear infinite}
@keyframes scroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.ticker-item{display:inline-flex;align-items:center;gap:8px;font-size:12px}
.ticker-name{color:var(--text2);font-weight:500}
.ticker-price{font-weight:700;font-family:monospace}
.ticker-change{font-size:11px;font-family:monospace}

/* ── PORTEFEUILLE ── */
.port-header{padding:20px 20px 12px;display:flex;justify-content:space-between;align-items:center}
.port-title{font-size:22px;font-weight:800;letter-spacing:-0.5px}
.edit-btn{
  background:var(--card2);border:1px solid var(--border);border-radius:10px;
  padding:8px 14px;color:var(--yellow);font-size:12px;font-weight:600;cursor:pointer;
}

/* ── DETAIL ── */
.detail-back{
  display:flex;align-items:center;gap:8px;padding:16px 20px 0;
  color:var(--green);font-size:14px;cursor:pointer;background:none;border:none;
}
.detail-hero{padding:20px}
.detail-badge{
  display:inline-block;font-size:9px;font-weight:700;text-transform:uppercase;
  letter-spacing:1px;padding:3px 10px;border-radius:6px;margin-bottom:12px;
}
.detail-name{font-size:24px;font-weight:800;letter-spacing:-0.5px;margin-bottom:4px}
.detail-ticker{font-size:12px;color:var(--blue);margin-bottom:4px}
.detail-isin{font-size:11px;color:var(--dim);margin-bottom:16px}
.detail-price{font-size:36px;font-weight:800;letter-spacing:-1px;margin-bottom:6px}
.detail-change{display:inline-flex;align-items:center;gap:6px;font-size:14px;font-weight:600;padding:5px 12px;border-radius:12px}

/* PERIOD */
.period-wrap{padding:0 20px;margin-bottom:12px}
.period-row{display:flex;gap:6px;background:var(--card);border-radius:12px;padding:4px}
.period-btn{
  flex:1;padding:8px 0;border-radius:8px;border:none;
  background:none;color:var(--text2);font-size:12px;font-weight:600;cursor:pointer;
  transition:all 0.2s;
}
.period-btn.active{background:var(--bg2);color:var(--text);box-shadow:0 2px 8px #00000040}

/* CHART */
.chart-wrap{padding:0 16px;margin-bottom:16px}
.chart-box{
  background:var(--card);border-radius:20px;border:1px solid var(--border);
  overflow:hidden;padding:16px 12px 8px;
}
.chart-loading{height:180px;display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:13px}
.chart-info{display:flex;justify-content:space-between;padding:8px 4px 4px;font-size:10px;color:var(--dim);font-family:monospace}

/* STATS CARD */
.stats-wrap{padding:0 16px;margin-bottom:16px}
.stats-box{background:var(--card);border-radius:20px;border:1px solid var(--border);overflow:hidden}
.stats-title{padding:14px 16px;font-size:10px;letter-spacing:2px;color:var(--text2);text-transform:uppercase;border-bottom:1px solid var(--border)}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid var(--border)}
.stat-row:last-child{border-bottom:none}
.stat-label{font-size:12px;color:var(--text2)}
.stat-value{font-size:14px;font-weight:700;font-family:monospace}

/* ── SIMULATION ── */
.sim-wrap{padding:20px 16px}
.sim-title{font-size:22px;font-weight:800;letter-spacing:-0.5px;margin-bottom:20px}
.sim-card{background:var(--card);border-radius:20px;border:1px solid var(--border);padding:20px;margin-bottom:16px}
.sim-card-title{font-size:10px;letter-spacing:2px;color:var(--purple);text-transform:uppercase;margin-bottom:18px}
.slider-wrap{margin-bottom:4px}
.slider-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.slider-label{font-size:13px;color:var(--text2)}
.slider-val{font-size:16px;font-weight:800;letter-spacing:-0.5px}
.slider-controls{display:flex;align-items:center;gap:10px}
.s-btn{
  width:38px;height:38px;border-radius:12px;border:1px solid var(--border);
  background:var(--bg);color:var(--text);font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:all 0.15s;font-weight:300;
}
.s-btn:active{background:var(--card2);transform:scale(0.95)}
.s-track{flex:1;height:4px;background:var(--border);border-radius:4px;overflow:hidden}
.s-fill{height:100%;border-radius:4px;transition:width 0.3s}
.sim-divider{height:1px;background:var(--border);margin:16px 0}
.sim-total{text-align:center;font-size:12px;color:var(--dim);margin-top:14px}

.scenarios-grid{display:flex;flex-direction:column;gap:10px}
.scenario-box{background:var(--card);border-radius:20px;border:1px solid;padding:20px}
.sc-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.sc-label{font-size:15px;font-weight:700}
.sc-rate{font-size:12px;opacity:0.6;font-family:monospace}
.sc-fv{font-size:34px;font-weight:800;letter-spacing:-1px;margin-bottom:14px}
.sc-stats{display:flex;background:var(--bg);border-radius:12px;padding:12px;gap:1px}
.sc-stat{flex:1;text-align:center}
.sc-stat-label{font-size:9px;color:var(--dim);letter-spacing:0.5px;margin-bottom:5px;text-transform:uppercase}
.sc-stat-value{font-size:13px;font-weight:700;font-family:monospace}
.sc-divider{width:1px;background:var(--border)}

/* ── ALERTES ── */
.alerts-wrap{padding:20px 16px}
.alerts-title{font-size:22px;font-weight:800;letter-spacing:-0.5px;margin-bottom:16px}
.alerts-stats{display:flex;gap:10px;margin-bottom:16px}
.alert-stat-card{flex:1;background:var(--card);border-radius:16px;border:1px solid;padding:14px;text-align:center}
.alert-stat-num{font-size:26px;font-weight:800;letter-spacing:-1px}
.alert-stat-label{font-size:9px;color:var(--dim);letter-spacing:1px;margin-top:4px;text-transform:uppercase}
.new-alert-btn{
  width:100%;background:var(--yellow);border:none;border-radius:16px;
  padding:15px;color:#000;font-size:14px;font-weight:700;cursor:pointer;
  margin-bottom:16px;transition:opacity 0.2s;
}
.new-alert-btn:active{opacity:0.8}

.alert-form{
  background:var(--card);border-radius:20px;border:1px solid #FFD06044;
  padding:20px;margin-bottom:16px;display:none;
}
.alert-form.open{display:block}
.af-title{font-size:10px;letter-spacing:2px;color:var(--yellow);text-transform:uppercase;margin-bottom:16px}
.af-input{
  width:100%;background:var(--bg);border:1px solid var(--border);
  border-radius:12px;padding:13px 16px;color:var(--text);font-size:14px;
  margin-bottom:10px;outline:none;transition:border-color 0.2s;
}
.af-input:focus{border-color:var(--yellow)}
.af-type-row{display:flex;gap:8px;margin-bottom:10px}
.af-type{
  flex:1;background:var(--bg);border:1px solid var(--border);
  border-radius:12px;padding:12px;text-align:center;cursor:pointer;
  font-size:12px;color:var(--text2);transition:all 0.2s;
}
.af-type.above.on{border-color:var(--green);background:#00E5A011;color:var(--green)}
.af-type.below.on{border-color:var(--red);background:#FF5C7A11;color:var(--red)}
.af-submit{
  width:100%;background:var(--green);border:none;border-radius:12px;
  padding:14px;color:#000;font-size:14px;font-weight:700;cursor:pointer;margin-top:4px;
}

.alert-card{
  background:var(--card);border-radius:16px;border:1px solid;
  padding:16px;margin-bottom:10px;
  display:flex;justify-content:space-between;align-items:center;
  transition:opacity 0.3s;
}
.alert-card.off{opacity:0.4}
.alert-icon{
  width:42px;height:42px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;font-weight:700;margin-right:12px;flex-shrink:0;
}
.alert-asset{font-size:14px;font-weight:700;margin-bottom:3px}
.alert-cond{font-size:11px;font-family:monospace}
.alert-actions{display:flex;align-items:center;gap:12px}
.toggle{
  width:44px;height:24px;border-radius:12px;background:var(--border);
  position:relative;cursor:pointer;border:none;transition:background 0.3s;flex-shrink:0;
}
.toggle.on{background:var(--green)}
.toggle::after{
  content:'';width:18px;height:18px;border-radius:9px;background:#fff;
  position:absolute;top:3px;left:3px;transition:left 0.3s;
}
.toggle.on::after{left:23px}
.del-btn{background:none;border:none;color:var(--dim);font-size:18px;cursor:pointer;padding:4px;transition:color 0.2s}
.del-btn:hover{color:var(--red)}

/* MODAL */
.modal-overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:#000000BB;backdrop-filter:blur(4px);
  z-index:200;display:none;align-items:flex-end;justify-content:center;
}
.modal-overlay.open{display:flex}
.modal{
  background:var(--card2);border-radius:28px 28px 0 0;
  padding:8px 20px 40px;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;
}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 20px}
.modal-title{font-size:18px;font-weight:800;margin-bottom:20px;text-align:center}
.modal-label{font-size:10px;letter-spacing:1px;color:var(--text2);text-transform:uppercase;margin-bottom:8px;margin-top:14px;display:block}
.modal-input{
  width:100%;background:var(--bg);border:1px solid var(--border);
  border-radius:12px;padding:13px 16px;color:var(--text);font-size:14px;outline:none;
  transition:border-color 0.2s;
}
.modal-input:focus{border-color:var(--green)}
.modal-type-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:4px}
.modal-type-chip{
  background:var(--bg);border:1px solid var(--border);
  border-radius:10px;padding:8px 14px;font-size:12px;color:var(--text2);cursor:pointer;
  transition:all 0.2s;
}
.modal-type-chip.active{border-color:var(--green);background:#00E5A011;color:var(--green)}
.modal-btns{display:flex;gap:10px;margin-top:20px}
.modal-cancel{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:14px;padding:15px;color:var(--text2);font-size:14px;cursor:pointer}
.modal-save{flex:2;border:none;border-radius:14px;padding:15px;color:#000;font-size:14px;font-weight:700;cursor:pointer}

/* ANIMATIONS */
.fade-in{animation:fadeIn 0.3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.value-change{animation:valueChange 0.5s ease}
@keyframes valueChange{0%{transform:scale(1.05)}100%{transform:scale(1)}}

/* RESPONSIVE */
@media(max-height:700px){.patrimoine-value{font-size:36px}}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-title">💼 Portfolio</div>
  <div class="live-indicator">
    <div class="live-dot" id="live-dot"></div>
    <span id="live-text">En direct</span>
  </div>
</div>

<!-- SCROLL -->
<div class="scroll" id="scroll-area">

  <!-- PAGE DASHBOARD -->
  <div class="page active" id="page-dashboard"></div>

  <!-- PAGE PORTEFEUILLE -->
  <div class="page" id="page-portefeuille"></div>

  <!-- PAGE DETAIL -->
  <div class="page" id="page-detail"></div>

  <!-- PAGE SIMULATION -->
  <div class="page" id="page-simulation"></div>

  <!-- PAGE ALERTES -->
  <div class="page" id="page-alertes"></div>

</div>

<!-- NAV -->
<nav class="nav">
  <button class="nav-btn active" onclick="goTo('dashboard')"><span class="nav-icon">🏠</span><span>Accueil</span></button>
  <button class="nav-btn" onclick="goTo('portefeuille')"><span class="nav-icon">💼</span><span>Portefeuille</span></button>
  <button class="nav-btn" onclick="goTo('simulation')"><span class="nav-icon">📊</span><span>Simulation</span></button>
  <button class="nav-btn" onclick="goTo('alertes')"><span class="nav-icon">🔔</span><span>Alertes</span></button>
</nav>

<!-- MODAL EDIT -->
<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title">Modifier</div>
    <label class="modal-label">Nom *</label>
    <input class="modal-input" id="f-name" placeholder="Ex: Nasdaq 100">
    <label class="modal-label">ISIN</label>
    <input class="modal-input" id="f-isin" placeholder="Ex: FR0011871110">
    <label class="modal-label">Ticker Yahoo Finance</label>
    <input class="modal-input" id="f-ticker" placeholder="Ex: PUST.PA">
    <label class="modal-label">Type</label>
    <div class="modal-type-row" id="modal-types">
      <div class="modal-type-chip active" onclick="pickType('ETF')">ETF</div>
      <div class="modal-type-chip" onclick="pickType('Action')">Action</div>
      <div class="modal-type-chip" onclick="pickType('Fonds €')">Fonds €</div>
      <div class="modal-type-chip" onclick="pickType('Obligation')">Obligation</div>
      <div class="modal-type-chip" onclick="pickType('Crypto')">Crypto</div>
    </div>
    <label class="modal-label">Montant investi (€)</label>
    <input class="modal-input" id="f-invested" type="number" placeholder="250">
    <label class="modal-label">Valeur actuelle (€)</label>
    <input class="modal-input" id="f-current" type="number" placeholder="270">
    <label class="modal-label">Quantité (optionnel)</label>
    <input class="modal-input" id="f-qty" type="number" placeholder="10">
    <label class="modal-label">Versement mensuel (€)</label>
    <input class="modal-input" id="f-monthly" type="number" placeholder="50" value="0">
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal()">Annuler</button>
      <button class="modal-save" id="modal-save-btn" onclick="saveHolding()">✓ Enregistrer</button>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════
// CONFIG
// ════════════════════════════════════════════════════════
const API = 'https://portfolio-api-j1go.vercel.app';
const REFRESH_INTERVAL = 30000; // 30 secondes (Yahoo Finance limite le trop rapide)

const eur = n => new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR',maximumFractionDigits:0}).format(n);
const eurD = n => new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR',minimumFractionDigits:2,maximumFractionDigits:2}).format(n);
const total = h => h.reduce((s,x)=>s+(x.current||0),0);
const invested = h => h.reduce((s,x)=>s+(x.invested||0),0);
const monthly = p => Object.values(p).reduce((s,a)=>s+a.holdings.reduce((ss,h)=>ss+(h.monthly||0),0),0);
const fv = (m,y,r) => {const n=y*12,rt=r/12;return rt===0?m*n:m*((Math.pow(1+rt,n)-1)/rt)*(1+rt)};
const genId = () => Date.now().toString(36)+Math.random().toString(36).slice(2);
const hhmm = d => `${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;

function goTo(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const page = document.getElementById(`page-${name}`);
  if(page){page.classList.add('active');page.classList.add('fade-in');setTimeout(()=>page.classList.remove('fade-in'),300);}
  const btns = ['dashboard','portefeuille','simulation','alertes'];
  const idx = btns.indexOf(name);
  if(idx>=0) document.querySelectorAll('.nav-btn')[idx].classList.add('active');
  currentPage = name;
  document.getElementById('scroll-area').scrollTop = 0;
  if(name==='dashboard') renderDash();
  if(name==='portefeuille') renderPort();
  if(name==='simulation') renderSim();
  if(name==='alertes') renderAlerts();
}

function showDetail(accId, holdingId){

function setLiveStatus(status){
  const dot = document.getElementById('live-dot');
  const txt = document.getElementById('live-text');
  if(!dot||!txt) return;
  dot.className = 'live-dot' + (status==='loading'?' loading':status==='error'?' error':'');
  if(status==='loading') txt.textContent = 'Mise à jour...';
  else if(status==='error') txt.textContent = 'Hors ligne';
  else if(lastUpdateTime) txt.textContent = `Mis à jour ${hhmm(lastUpdateTime)}`;
  else txt.textContent = 'En direct';
}

async function fetchPrices(force=false){
  const tickers=[...new Set(Object.values(P).flatMap(a=>a.holdings.map(h=>h.ticker)).filter(Boolean))];
  if(!tickers.length) return;
  setLiveStatus('loading');
  try{
    const res = await fetch(`${API}/api/quote?symbols=${encodeURIComponent(tickers.join(','))}`);
    const json = await res.json();
    if(!json.success) throw new Error('API error');
    let changed = false;
    Object.values(P).forEach(acc=>{
      acc.holdings.forEach(h=>{
        if(!h.ticker||!json.data[h.ticker]||json.data[h.ticker].error) return;
        const p = json.data[h.ticker];
        if(h.qty) h.current = +(h.qty*p.price).toFixed(2);
        h.marketData = {price:p.price,change:p.change,changePercent:p.changePercent,currency:p.currency};
        changed = true;
      });
    });
    if(changed){saveP();lastUpdateTime=new Date();}
    setLiveStatus('live');
    if(currentPage==='dashboard') renderDash();
    if(currentPage==='portefeuille') renderPort();
    if(currentPage==='detail'&&currentDetail) renderDetailPrices();
  }catch(e){
    setLiveStatus('error');
  }
}

function startAutoRefresh(){
  fetchPrices();
  clearInterval(refreshTimer);
  refreshTimer = setInterval(fetchPrices, REFRESH_INTERVAL);
}

async function changePeriod(p){
  currentPeriod = p;
  document.querySelectorAll('.period-btn').forEach(b=>{
    const map={'1d':'1J','1wk':'1S','1mo':'1M','6mo':'6M','1y':'1A','5y':'5A'};
    b.classList.toggle('active',b.textContent===map[p]);
  });
  const ca = document.getElementById('chart-area');
  if(ca) ca.innerHTML = '<div class="chart-loading">📊 Chargement...</div>';
  if(currentDetail) loadChart(currentDetail.h.ticker, p, currentDetail.acc.color);
}

async function loadChart(ticker, period, color){
  const ca = document.getElementById('chart-area');
  if(!ca) return;
  try{
    const map={'1d':'5m,1d','1wk':'1h,5d','1mo':'1d,1mo','6mo':'1wk,6mo','1y':'1wk,1y','5y':'1mo,5y'};
    const [iv,rg] = map[period].split(',');
    const res = await fetch(`${API}/api/quote?ticker=${encodeURIComponent(ticker)}&interval=${iv}&range=${rg}`);
    const json = await res.json();
    if(json.error||!json.data||json.data.length<2){
      ca.innerHTML='<div class="chart-loading">Données non disponibles</div>';return;
    }
    drawChart(json.data, color, period);
  }catch(e){
    ca.innerHTML='<div class="chart-loading">Erreur de connexion</div>';
  }
}

function drawChart(data, color, period){
  const ca = document.getElementById('chart-area');
  const ci = document.getElementById('chart-info');
  if(!ca) return;
  const W = ca.offsetWidth||320;
  const H = 180;
  const PAD = {t:16,b:24,l:8,r:52};
  const prices = data.map(d=>d.price);
  const minP = Math.min(...prices), maxP = Math.max(...prices);
  const rng = maxP-minP||1;
  const isUp = prices[prices.length-1]>=prices[0];
  const lc = isUp?'#00E5A0':'#FF5C7A';
  const x = i => PAD.l + (i/(data.length-1))*(W-PAD.l-PAD.r);
  const y = p => PAD.t + (H-PAD.t-PAD.b) - ((p-minP)/rng)*(H-PAD.t-PAD.b);
  const line = data.map((d,i)=>`${i===0?'M':'L'}${x(i).toFixed(1)},${y(d.price).toFixed(1)}`).join(' ');
  const fill = `${line} L${x(data.length-1).toFixed(1)},${(H-PAD.b).toFixed(1)} L${PAD.l},${(H-PAD.b).toFixed(1)} Z`;
  const yl = [minP,(minP+maxP)/2,maxP];
  let svg = `<svg width="${W}" height="${H}" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="lg" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${lc}" stop-opacity="0.25"/>
        <stop offset="100%" stop-color="${lc}" stop-opacity="0.02"/>
      </linearGradient>
    </defs>`;
  yl.forEach(v=>{
    const yy=y(v);
    svg+=`<line x1="${PAD.l}" y1="${yy.toFixed(1)}" x2="${W-PAD.r}" y2="${yy.toFixed(1)}" stroke="#1E1E2A" stroke-width="1"/>
    <text x="${W-PAD.r+4}" y="${(yy+4).toFixed(1)}" fill="#3A3A50" font-size="9" font-family="monospace">${v.toFixed(2)}</text>`;
  });
  svg += `<path d="${fill}" fill="url(#lg)"/>
    <path d="${line}" stroke="${lc}" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="${x(data.length-1).toFixed(1)}" cy="${y(prices[prices.length-1]).toFixed(1)}" r="4" fill="${lc}" stroke="var(--card)" stroke-width="2"/>
  </svg>`;
  ca.innerHTML = svg;

  // Info bar
  if(ci){
    const chg = prices[prices.length-1]-prices[0];
    const chgPct = (chg/prices[0]*100);
    const d1 = new Date(data[0].time), d2 = new Date(data[data.length-1].time);
    const fmt = d => d.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'});
    ci.innerHTML = `<span>${fmt(d1)} → ${fmt(d2)}</span><span style="color:${isUp?'var(--green)':'var(--red)'}">${isUp?'+':''}${chg.toFixed(2)} (${isUp?'+':''}${chgPct.toFixed(2)}%)</span>`;
  }
}

// ════════════════════════════════════════════════════════
// EDIT PORTFOLIO
// ════════════════════════════════════════════════════════
function showEditPage(){
  const p = document.getElementById('page-portefeuille');
  let html = `
    <div class="port-header">
      <div class="port-title">✏️ Modifier</div>
      <button class="edit-btn" onclick="renderPort();document.getElementById('page-portefeuille').innerHTML=origPortHtml" style="color:var(--text2)">← Retour</button>
    </div>
  `;

  Object.values(P).forEach(acc=>{
    html += `
      <div style="margin:0 16px 16px">
        <div style="background:var(--card);border-radius:16px 16px 0 0;border:1px solid ${acc.color}44;padding:14px 16px;display:flex;justify-content:space-between;align-items:center">
          <div style="font-size:15px;font-weight:700">${acc.icon} ${acc.label}</div>
          <div style="font-size:11px;color:var(--text2)">${acc.platform}</div>
        </div>
        ${acc.holdings.map(h=>`
          <div style="background:var(--bg);border-left:1px solid var(--border);border-right:1px solid var(--border);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;justify-content:space-between;align-items:center">
            <div style="flex:1;min-width:0">
              <div style="font-size:13px;font-weight:600;color:var(--text)">${h.name}</div>
              <div style="font-size:10px;color:var(--text2);margin-top:2px">${h.type} · ${h.invested}€ → ${h.current}€ ${h.ticker?'· 📡'+h.ticker:''}</div>
            </div>
            <div style="display:flex;gap:6px;flex-shrink:0;margin-left:8px">
              <button onclick="openEdit('${acc.id}','${h.id}')" style="background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:6px 10px;color:var(--text);font-size:14px;cursor:pointer">✏️</button>
              <button onclick="delHolding('${acc.id}','${h.id}')" style="background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:6px 10px;color:var(--red);font-size:14px;cursor:pointer">🗑️</button>
            </div>
          </div>
        `).join('')}
        <button onclick="openAdd('${acc.id}')" style="width:100%;border:1px dashed ${acc.color}55;border-top:none;border-radius:0 0 16px 16px;padding:12px;background:none;color:${acc.color};font-size:13px;font-weight:600;cursor:pointer">+ Ajouter une ligne</button>
      </div>
    `;
  });

  p.innerHTML = html;
}

function openEdit(accId, holdingId){
  const h = P[accId].holdings.find(x=>x.id===holdingId);
  editAccId=accId; editHolding=h;
  document.getElementById('modal-title').textContent='✏️ Modifier';
  document.getElementById('f-name').value=h.name||'';
  document.getElementById('f-isin').value=h.isin||'';
  document.getElementById('f-ticker').value=h.ticker||'';
  document.getElementById('f-invested').value=h.invested||'';
  document.getElementById('f-current').value=h.current||'';
  document.getElementById('f-qty').value=h.qty||'';
  document.getElementById('f-monthly').value=h.monthly||0;
  pickType(h.type||'ETF');
  document.getElementById('modal-save-btn').style.background=P[accId].color;
  document.getElementById('modal').classList.add('open');
}

function openAdd(accId){
  editAccId=accId; editHolding=null;
  document.getElementById('modal-title').textContent='➕ Ajouter';
  ['f-name','f-isin','f-ticker','f-invested','f-current','f-qty'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-monthly').value='0';
  pickType('ETF');
  document.getElementById('modal-save-btn').style.background=P[accId].color;
  document.getElementById('modal').classList.add('open');
}

function closeModal(){document.getElementById('modal').classList.remove('open');}

function pickType(t){
  currentType=t;
  document.querySelectorAll('.modal-type-chip').forEach(c=>c.classList.toggle('active',c.textContent===t));
}

function saveHolding(){
  const name=document.getElementById('f-name').value.trim();
  if(!name){alert('Le nom est obligatoire');return;}
  const h={
    id:editHolding?.id||genId(),name,
    isin:document.getElementById('f-isin').value.trim()||'—',
    ticker:document.getElementById('f-ticker').value.trim()||null,
    type:currentType,
    invested:parseFloat(document.getElementById('f-invested').value)||0,
    current:parseFloat(document.getElementById('f-current').value)||0,
    qty:document.getElementById('f-qty').value?parseFloat(document.getElementById('f-qty').value):null,
    monthly:parseFloat(document.getElementById('f-monthly').value)||0,
  };
  const acc=P[editAccId];
  const idx=acc.holdings.findIndex(x=>x.id===h.id);
  if(idx>=0)acc.holdings[idx]=h; else acc.holdings.push(h);
  saveP(); closeModal(); showEditPage();
}

function delHolding(accId,holdingId){
  if(!confirm('Supprimer cette ligne ?'))return;
  P[accId].holdings=P[accId].holdings.filter(h=>h.id!==holdingId);
  saveP(); showEditPage();
}

// ════════════════════════════════════════════════════════
// SIMULATION
// ════════════════════════════════════════════════════════
function renderSim(){
  simMonthly = simMonthly || monthly(P);
  updateSim();
}

function updateSim(){
  const maxFV = fv(simMonthly,simYears,0.15);
  const pm = ((simMonthly-50)/950*100);
  const py = ((simYears-1)/29*100);

  let html = `
    <div class="sim-wrap">
      <div class="sim-title">Simulation</div>
      <div class="sim-card">
        <div class="sim-card-title">Paramètres</div>
        <div class="slider-wrap">
          <div class="slider-header">
            <span class="slider-label">Versement mensuel</span>
            <span class="slider-val" style="color:var(--purple)">${simMonthly} €</span>
          </div>
          <div class="slider-controls">
            <button class="s-btn" onclick="adjM(-25)">−</button>
            <div class="s-track"><div class="s-fill" style="width:${pm}%;background:var(--purple)"></div></div>
            <button class="s-btn" onclick="adjM(25)">+</button>
          </div>
        </div>
        <div class="sim-divider"></div>
        <div class="slider-wrap">
          <div class="slider-header">
            <span class="slider-label">Horizon de placement</span>
            <span class="slider-val" style="color:var(--yellow)">${simYears} ans</span>
          </div>
          <div class="slider-controls">
            <button class="s-btn" onclick="adjY(-1)">−</button>
            <div class="s-track"><div class="s-fill" style="width:${py}%;background:var(--yellow)"></div></div>
            <button class="s-btn" onclick="adjY(1)">+</button>
          </div>
        </div>
        <div class="sim-total">Total investi : <strong>${eur(simMonthly*simYears*12)}</strong></div>
      </div>

      <div class="sim-card">
        <div class="sim-card-title">Projection</div>
        ${SCENARIOS.map(sc=>{
          const v=fv(simMonthly,simYears,sc.rate);
          const w=maxFV>0?(v/maxFV*100):0;
          return `<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
            <span style="font-size:18px;width:24px">${sc.emoji}</span>
            <div style="flex:1;height:6px;background:var(--border);border-radius:4px;overflow:hidden">
              <div style="width:${w}%;height:100%;background:${sc.color};border-radius:4px"></div>
            </div>
            <span style="font-size:12px;font-family:monospace;color:${sc.color};width:90px;text-align:right">${eur(v)}</span>
          </div>`;
        }).join('')}
      </div>

      <div class="scenarios-grid">
        ${SCENARIOS.map(sc=>{
          const fvVal=fv(simMonthly,simYears,sc.rate);
          const inv=simMonthly*simYears*12;
          const gain=fvVal-inv;
          const mult=inv>0?fvVal/inv:1;
          return `<div class="scenario-box" style="border-color:${sc.color}44">
            <div class="sc-header">
              <span class="sc-label" style="color:${sc.color}">${sc.emoji} ${sc.label}</span>
              <span class="sc-rate" style="color:${sc.color}">${(sc.rate*100).toFixed(0)}% / an</span>
            </div>
            <div class="sc-fv" style="color:${sc.color}">${eur(fvVal)}</div>
            <div class="sc-stats">
              <div class="sc-stat"><div class="sc-stat-label">Investi</div><div class="sc-stat-value">${eur(inv)}</div></div>
              <div class="sc-divider"></div>
              <div class="sc-stat"><div class="sc-stat-label">Gains</div><div class="sc-stat-value" style="color:${sc.color}">+${eur(gain)}</div></div>
              <div class="sc-divider"></div>
              <div class="sc-stat"><div class="sc-stat-label">Multiplie</div><div class="sc-stat-value" style="color:${sc.color}">×${mult.toFixed(1)}</div></div>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>
  `;

  document.getElementById('page-simulation').innerHTML = html;
}

function adjM(d){simMonthly=Math.max(50,Math.min(1000,simMonthly+d));updateSim();}
function adjY(d){simYears=Math.max(1,Math.min(30,simYears+d));updateSim();}

// ════════════════════════════════════════════════════════
// ALERTES
// ════════════════════════════════════════════════════════
function renderAlerts(){
  const active=alerts.filter(a=>a.active).length;
  let html = `
    <div class="alerts-wrap">
      <div class="alerts-title">Alertes prix</div>
      <div class="alerts-stats">
        <div class="alert-stat-card" style="border-color:var(--yellow)44">
          <div class="alert-stat-num" style="color:var(--yellow)">${alerts.length}</div>
          <div class="alert-stat-label">Total</div>
        </div>
        <div class="alert-stat-card" style="border-color:var(--green)44">
          <div class="alert-stat-num" style="color:var(--green)">${active}</div>
          <div class="alert-stat-label">Actives</div>
        </div>
      </div>
      <button class="new-alert-btn" onclick="toggleAF()">+ Nouvelle alerte</button>
      <div class="alert-form" id="af">
        <div class="af-title">Nouvelle alerte</div>
        <input class="af-input" id="af-asset" placeholder="Nom de l'actif (ex: Xiaomi)">
        <div class="af-type-row">
          <div class="af-type above on" id="af-above" onclick="setAT('above')">▲ Au-dessus de</div>
          <div class="af-type below" id="af-below" onclick="setAT('below')">▼ En-dessous de</div>
        </div>
        <input class="af-input" id="af-value" type="number" placeholder="Prix cible en €">
        <button class="af-submit" onclick="addAlert()">✓ Créer l'alerte</button>
      </div>
      <div style="font-size:10px;letter-spacing:2px;color:var(--text2);text-transform:uppercase;margin-bottom:12px">Mes alertes</div>
  `;

  if(!alerts.length){
    html+=`<div style="text-align:center;padding:40px;color:var(--text2)"><div style="font-size:52px;margin-bottom:12px">🔕</div><div>Aucune alerte configurée</div></div>`;
  } else {
    alerts.forEach(a=>{
      const c=a.type==='above'?'var(--green)':'var(--red)';
      const bc=a.type==='above'?'var(--green)':'var(--red)';
      html+=`<div class="alert-card ${a.active?'':'off'}" style="border-color:${a.active?(a.type==='above'?'#00E5A044':'#FF5C7A44'):'var(--border)'}">
        <div style="display:flex;align-items:center;flex:1;min-width:0">
          <div class="alert-icon" style="background:${a.type==='above'?'#00E5A020':'#FF5C7A20'};color:${c}">${a.type==='above'?'▲':'▼'}</div>
          <div style="min-width:0">
            <div class="alert-asset">${a.asset}</div>
            <div class="alert-cond" style="color:${c}">${a.type==='above'?'Au-dessus de':'En-dessous de'} ${a.value} €</div>
          </div>
        </div>
        <div class="alert-actions">
          <button class="toggle ${a.active?'on':''}" onclick="toggleA(${a.id})"></button>
          <button class="del-btn" onclick="delAlert(${a.id})">✕</button>
        </div>
      </div>`;
    });
  }
  html += `</div>`;
  document.getElementById('page-alertes').innerHTML = html;
}

function toggleAF(){const f=document.getElementById('af');if(f)f.classList.toggle('open');}
function setAT(t){
  newAlertType=t;
  document.getElementById('af-above')?.classList.toggle('on',t==='above');
  document.getElementById('af-below')?.classList.toggle('on',t==='below');
}
function addAlert(){
  const asset=document.getElementById('af-asset')?.value?.trim();
  const val=parseFloat(document.getElementById('af-value')?.value);
  if(!asset||isNaN(val)||val<=0){alert('Remplis tous les champs');return;}
  alerts.push({id:Date.now(),asset,type:newAlertType,value:val,active:true});
  localStorage.setItem('alerts',JSON.stringify(alerts));
  renderAlerts();
}
function toggleA(id){
  alerts=alerts.map(a=>a.id===id?{...a,active:!a.active}:a);
  localStorage.setItem('alerts',JSON.stringify(alerts));
  renderAlerts();
}
function delAlert(id){
  if(!confirm('Supprimer ?'))return;
  alerts=alerts.filter(a=>a.id!==id);
  localStorage.setItem('alerts',JSON.stringify(alerts));
  renderAlerts();
}
