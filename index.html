<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Portfolio">
<meta name="application-name" content="Portfolio">
<meta name="theme-color" content="#09090B">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Portfolio</title>
<style>
/* ═══════════════════════════════════════════════
   DESIGN TOKENS
═══════════════════════════════════════════════ */
:root {
  --accent: #16A34A;
  --accent-light: #22C55E;
  --danger: #DC2626;
  --danger-light: #EF4444;
  --blue: #2563EB;
  --blue-light: #3B82F6;
  --amber: #D97706;
  --amber-light: #F59E0B;
  --purple: #7C3AED;
  --purple-light: #8B5CF6;

  --radius-sm: 8px;
  --radius: 12px;
  --radius-lg: 18px;
  --radius-xl: 24px;

  --shadow-sm: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
  --shadow: 0 4px 16px rgba(0,0,0,.10), 0 2px 4px rgba(0,0,0,.04);
  --shadow-lg: 0 10px 40px rgba(0,0,0,.15), 0 4px 8px rgba(0,0,0,.06);

  --font: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
  --font-mono: 'SF Mono', 'Fira Code', 'Fira Mono', monospace;

  --transition: 0.18s cubic-bezier(.4,0,.2,1);
}

/* DARK THEME */
[data-theme="dark"] {
  --bg: #09090B;
  --bg-2: #111113;
  --bg-3: #18181B;
  --bg-4: #1F1F23;
  --border: #27272A;
  --border-2: #3F3F46;
  --text-1: #FAFAFA;
  --text-2: #A1A1AA;
  --text-3: #71717A;
  --text-4: #52525B;
  --overlay: rgba(0,0,0,.7);
}

/* LIGHT THEME */
[data-theme="light"] {
  --bg: #FAFAFA;
  --bg-2: #FFFFFF;
  --bg-3: #F4F4F5;
  --bg-4: #E4E4E7;
  --border: #E4E4E7;
  --border-2: #D4D4D8;
  --text-1: #09090B;
  --text-2: #52525B;
  --text-3: #71717A;
  --text-4: #A1A1AA;
  --overlay: rgba(0,0,0,.4);
  --shadow-sm: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.03);
  --shadow: 0 4px 16px rgba(0,0,0,.07), 0 2px 4px rgba(0,0,0,.03);
  --shadow-lg: 0 10px 40px rgba(0,0,0,.10), 0 4px 8px rgba(0,0,0,.04);
}

/* ═══════════════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════════════ */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html { height:100%; font-size:16px; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text-1);
  height: 100%;
  overflow: hidden;
  transition: background var(--transition), color var(--transition);
}
button { font-family: inherit; cursor: pointer; border: none; background: none; }
input { font-family: inherit; }
a { text-decoration: none; }

/* ═══════════════════════════════════════════════
   LAYOUT — DESKTOP SIDEBAR + MOBILE BOTTOM NAV
═══════════════════════════════════════════════ */
.app {
  display: flex;
  height: 100vh;
  max-width: 1280px;
  margin: 0 auto;
}

/* SIDEBAR (desktop) */
.sidebar {
  width: 240px;
  flex-shrink: 0;
  background: var(--bg-2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 24px 16px;
  gap: 4px;
}
.sidebar-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  margin-bottom: 20px;
}
.logo-icon {
  width: 32px; height: 32px;
  background: var(--accent);
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
}
.logo-icon svg { color: white; }
.logo-text { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; }
.logo-sub { font-size: 11px; color: var(--text-3); margin-top: 1px; }

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: var(--radius);
  color: var(--text-2);
  font-size: 14px;
  font-weight: 500;
  transition: all var(--transition);
  cursor: pointer;
}
.nav-item:hover { background: var(--bg-3); color: var(--text-1); }
.nav-item.active { background: var(--bg-3); color: var(--text-1); font-weight: 600; }
.nav-item svg { flex-shrink: 0; opacity: 0.7; }
.nav-item.active svg { opacity: 1; color: var(--accent); }

.sidebar-bottom {
  margin-top: auto;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

/* MAIN CONTENT */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-width: 0;
}

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 24px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-2);
  flex-shrink: 0;
}
.topbar-title { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; }
.topbar-actions { display: flex; align-items: center; gap: 8px; }

.content { flex: 1; overflow-y: auto; padding: 24px; }
.content::-webkit-scrollbar { width: 4px; }
.content::-webkit-scrollbar-track { background: transparent; }
.content::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 4px; }

/* BOTTOM NAV (mobile) */
.bottom-nav {
  display: none;
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--bg-2);
  border-top: 1px solid var(--border);
  padding: 8px 0 max(12px, env(safe-area-inset-bottom));
  z-index: 100;
}
.bottom-nav-inner { display: flex; }
.bottom-nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 4px 0;
  color: var(--text-3);
  font-size: 10px;
  font-weight: 500;
  transition: color var(--transition);
}
.bottom-nav-item.active { color: var(--accent); }
.bottom-nav-item svg { transition: transform var(--transition); }
.bottom-nav-item.active svg { transform: scale(1.1); }

/* MOBILE TOPBAR */
.mobile-topbar {
  display: none;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-2);
  flex-shrink: 0;
}

/* ═══════════════════════════════════════════════
   COMPONENTS
═══════════════════════════════════════════════ */

/* ICON BUTTON */
.icon-btn {
  width: 36px; height: 36px;
  border-radius: var(--radius);
  display: flex; align-items: center; justify-content: center;
  color: var(--text-2);
  transition: all var(--transition);
  background: transparent;
}
.icon-btn:hover { background: var(--bg-3); color: var(--text-1); }
.icon-btn.active { background: var(--bg-3); color: var(--accent); }

/* BADGE */
.badge {
  display: inline-flex; align-items: center;
  padding: 3px 8px; border-radius: 6px;
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.3px;
}
.badge-green { background: rgba(22,163,74,.12); color: var(--accent-light); }
.badge-red { background: rgba(220,38,38,.12); color: var(--danger-light); }
.badge-blue { background: rgba(37,99,235,.12); color: var(--blue-light); }
.badge-amber { background: rgba(217,119,6,.12); color: var(--amber-light); }
.badge-purple { background: rgba(124,58,237,.12); color: var(--purple-light); }
.badge-neutral { background: var(--bg-3); color: var(--text-2); }

/* CARD */
.card {
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-sm);
}
.card-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
}
.card-title { font-size: 13px; font-weight: 600; color: var(--text-2); text-transform: uppercase; letter-spacing: 0.5px; }
.card-body { padding: 20px; }

/* DIVIDER */
.divider { height: 1px; background: var(--border); }

/* INPUT */
.input {
  width: 100%;
  background: var(--bg-3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 14px;
  color: var(--text-1);
  font-size: 14px;
  outline: none;
  transition: border-color var(--transition);
}
.input:focus { border-color: var(--accent); }
.input::placeholder { color: var(--text-4); }

/* BTN */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 9px 16px; border-radius: var(--radius);
  font-size: 13px; font-weight: 600;
  transition: all var(--transition);
}
.btn-primary { background: var(--accent); color: white; }
.btn-primary:hover { background: var(--accent-light); }
.btn-secondary { background: var(--bg-3); color: var(--text-1); border: 1px solid var(--border); }
.btn-secondary:hover { background: var(--bg-4); }
.btn-danger { background: rgba(220,38,38,.1); color: var(--danger-light); border: 1px solid rgba(220,38,38,.2); }
.btn-danger:hover { background: rgba(220,38,38,.2); }
.btn-sm { padding: 6px 12px; font-size: 12px; }
.btn-lg { padding: 12px 24px; font-size: 15px; border-radius: var(--radius-lg); }
.btn-full { width: 100%; }

/* STAT CHIP */
.stat-chip {
  display: flex; flex-direction: column;
  gap: 4px;
}
.stat-chip-label { font-size: 11px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.5px; }
.stat-chip-value { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; font-variant-numeric: tabular-nums; }
.stat-chip-sub { font-size: 12px; color: var(--text-3); }

/* LIVE DOT */
.live-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 10px; border-radius: 20px;
  background: var(--bg-3); border: 1px solid var(--border);
  font-size: 11px; color: var(--text-2); font-weight: 500;
}
.live-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 6px var(--accent);
  animation: pulse 2s infinite;
}
.live-dot.loading { background: var(--amber); box-shadow: 0 0 6px var(--amber); }
.live-dot.error { background: var(--danger); box-shadow: 0 0 6px var(--danger); animation: none; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }

/* THEME SWITCH (mobile) */
.theme-switch { background:none; border:none; padding:0; cursor:pointer; }
.theme-switch-track {
  display:flex; align-items:center; width:52px; height:28px;
  background:var(--bg-4); border:1px solid var(--border-2);
  border-radius:20px; padding:2px; transition:background var(--transition);
  position:relative;
}
[data-theme="dark"] .theme-switch-track { background:#27272A; }
.theme-switch-thumb {
  width:22px; height:22px; border-radius:50%;
  background:var(--bg-2); box-shadow:0 1px 3px rgba(0,0,0,.3);
  display:flex; align-items:center; justify-content:center;
  transition:transform var(--transition); color:var(--amber);
}
[data-theme="dark"] .theme-switch-thumb { transform:translateX(24px); color:var(--blue-light); }
.theme-switch-thumb .ts-sun { display:block; }
.theme-switch-thumb .ts-moon { display:none; }
[data-theme="dark"] .theme-switch-thumb .ts-sun { display:none; }
[data-theme="dark"] .theme-switch-thumb .ts-moon { display:block; }

/* TOGGLE SWITCH */
.toggle {
  width: 40px; height: 22px; border-radius: 11px;
  background: var(--border-2);
  position: relative; cursor: pointer; border: none;
  transition: background var(--transition);
  flex-shrink: 0;
}
.toggle.on { background: var(--accent); }
.toggle::after {
  content: ''; width: 16px; height: 16px; border-radius: 50%;
  background: white; position: absolute; top: 3px; left: 3px;
  transition: left var(--transition);
  box-shadow: 0 1px 3px rgba(0,0,0,.2);
}
.toggle.on::after { left: 21px; }

/* PROGRESS BAR */
.progress { height: 3px; background: var(--bg-4); border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 2px; transition: width 1.2s cubic-bezier(.4,0,.2,1); }

/* ═══════════════════════════════════════════════
   PAGES
═══════════════════════════════════════════════ */
.page { display: none; }
.page.active { display: block; }

/* ── DASHBOARD ── */
.dashboard-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 16px;
  margin-bottom: 24px;
}
@media(max-width:900px) { .dashboard-grid { grid-template-columns: 1fr 1fr; } }
@media(max-width:600px) { .dashboard-grid { grid-template-columns: 1fr; } }

.hero-card {
  grid-column: 1 / -1;
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-xl);
  padding: 32px;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  flex-wrap: wrap;
  gap: 20px;
  box-shadow: var(--shadow);
}
.hero-left {}
.hero-label { font-size: 12px; color: var(--text-3); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
.hero-value {
  font-size: 52px; font-weight: 800; letter-spacing: -2px;
  line-height: 1; margin-bottom: 12px;
  color: var(--text-1);
  font-variant-numeric: tabular-nums;
}
@media(max-width:600px) { .hero-value { font-size: 38px; } }
.hero-change { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.hero-right { text-align: right; }
.hero-stats { display: flex; gap: 32px; }
@media(max-width:600px) { .hero-stats { gap: 20px; } }

.accounts-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 16px;
}
@media(max-width:600px) { .accounts-grid { grid-template-columns: 1fr; } }

.account-card {
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  transition: border-color var(--transition);
}
.account-card:hover { border-color: var(--border-2); }
.account-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 16px 20px;
  cursor: pointer;
  user-select: none;
}
.acc-left { display: flex; align-items: center; gap: 12px; }
.acc-icon {
  width: 40px; height: 40px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.acc-name { font-size: 15px; font-weight: 700; }
.acc-platform { font-size: 12px; color: var(--text-3); margin-top: 1px; }
.acc-right { text-align: right; }
.acc-value { font-size: 17px; font-weight: 800; font-variant-numeric: tabular-nums; }
.acc-gain { font-size: 12px; font-weight: 600; margin-top: 2px; }
.acc-chevron { color: var(--text-4); transition: transform var(--transition); margin-top: 2px; }
.acc-chevron.open { transform: rotate(180deg); }

.holdings-list { border-top: 1px solid var(--border); }
.holding-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 13px 20px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background var(--transition);
}
.holding-row:last-child { border-bottom: none; }
.holding-row:hover { background: var(--bg-3); }
.h-left { flex: 1; min-width: 0; margin-right: 16px; }
.h-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.h-meta { display: flex; align-items: center; gap: 8px; margin-top: 3px; flex-wrap: wrap; }
.h-live { font-size: 11px; font-family: var(--font-mono); }
.h-right { text-align: right; flex-shrink: 0; }
.h-value { font-size: 14px; font-weight: 700; font-variant-numeric: tabular-nums; }
.h-perf { font-size: 12px; font-weight: 600; margin-top: 2px; }
.h-arrow { color: var(--text-4); margin-top: 2px; }

/* ── TICKER SCROLL ── */
.ticker-bar {
  background: var(--bg-3);
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  padding: 8px 0;
  overflow: hidden;
  white-space: nowrap;
  margin-bottom: 24px;
}
.ticker-scroll { display: inline-flex; gap: 40px; animation: tickerMove 25s linear infinite; }
.ticker-scroll:hover { animation-play-state: paused; }
@keyframes tickerMove { from{transform:translateX(0)} to{transform:translateX(-50%)} }
.ticker-item { display: inline-flex; align-items: center; gap: 8px; font-size: 12px; }
.ticker-name { color: var(--text-3); }
.ticker-price { font-weight: 700; font-family: var(--font-mono); }
.ticker-chg { font-size: 11px; font-family: var(--font-mono); }

/* ── DETAIL ── */
.detail-hero {
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-xl);
  padding: 28px;
  margin-bottom: 20px;
}
.detail-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; flex-wrap: wrap; margin-bottom: 20px; }
.detail-name { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 6px; }
.detail-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.detail-price-area { text-align: right; }
.detail-price { font-size: 32px; font-weight: 800; letter-spacing: -1px; font-variant-numeric: tabular-nums; }
.detail-change { font-size: 14px; font-weight: 600; margin-top: 4px; }

/* PERIOD ROW */
.period-row { display: flex; gap: 4px; background: var(--bg-3); padding: 4px; border-radius: var(--radius); margin-bottom: 16px; }
.period-btn { flex: 1; padding: 8px 4px; border-radius: 8px; font-size: 12px; font-weight: 600; color: var(--text-3); transition: all var(--transition); }
.period-btn:hover { color: var(--text-1); }
.period-btn.active { background: var(--bg-2); color: var(--text-1); box-shadow: var(--shadow-sm); }

/* CHART */
.chart-box {
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px 16px 12px;
  margin-bottom: 20px;
}
.chart-area { width: 100%; }
.chart-loading { height: 180px; display: flex; align-items: center; justify-content: center; color: var(--text-3); font-size: 13px; }
.chart-footer { display: flex; justify-content: space-between; margin-top: 8px; font-size: 11px; color: var(--text-4); font-family: var(--font-mono); }

/* TOOLTIP */
.chart-tooltip {
  position: absolute; pointer-events: none;
  background: var(--bg-2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 8px 12px;
  font-size: 12px; font-family: var(--font-mono);
  box-shadow: var(--shadow); z-index: 10;
  display: none; white-space: nowrap;
}
.chart-tooltip .tt-date { color: var(--text-3); font-size: 10px; margin-bottom: 3px; }
.chart-tooltip .tt-price { font-size: 15px; font-weight: 800; }
.chart-tooltip .tt-chg { font-size: 11px; margin-top: 2px; }
.chart-wrapper { position: relative; }
/* PIE */
.pie-section { margin-bottom: 24px; }
.pie-wrapper { display: flex; align-items: center; gap: 28px; flex-wrap: wrap; }
.pie-legend { display: flex; flex-direction: column; gap: 10px; flex: 1; min-width: 160px; }
.pie-legend-item { display: flex; align-items: center; gap: 10px; font-size: 13px; cursor: default; }
.pie-legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.pie-legend-label { color: var(--text-2); flex: 1; }
.pie-legend-val { font-weight: 700; font-family: var(--font-mono); font-size: 13px; }
.pie-legend-pct { color: var(--text-3); font-size: 11px; }
/* STATS TABLE */
.stats-table { display: flex; flex-direction: column; }
.stats-row { display: flex; justify-content: space-between; align-items: center; padding: 13px 0; border-bottom: 1px solid var(--border); }
.stats-row:last-child { border-bottom: none; }
.stats-label { font-size: 13px; color: var(--text-2); }
.stats-value { font-size: 14px; font-weight: 700; font-family: var(--font-mono); font-variant-numeric: tabular-nums; }

/* ── SIMULATION ── */
.sim-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
@media(max-width:700px) { .sim-layout { grid-template-columns: 1fr; } }
.sim-scenarios { display: flex; flex-direction: column; gap: 12px; }
.scenario-card {
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px;
  transition: border-color var(--transition);
}
.scenario-card:hover { border-color: var(--border-2); }
.sc-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.sc-label { font-size: 14px; font-weight: 700; }
.sc-rate { font-size: 12px; color: var(--text-3); font-family: var(--font-mono); }
.sc-fv { font-size: 30px; font-weight: 800; letter-spacing: -1px; margin-bottom: 14px; font-variant-numeric: tabular-nums; }
.sc-stats-row { display: flex; background: var(--bg-3); border-radius: var(--radius); padding: 10px; }
.sc-stat { flex: 1; text-align: center; }
.sc-stat-label { font-size: 10px; color: var(--text-4); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
.sc-stat-value { font-size: 13px; font-weight: 700; font-family: var(--font-mono); font-variant-numeric: tabular-nums; }
.sc-divider { width: 1px; background: var(--border); }

/* SLIDER */
.slider-wrap { margin-bottom: 4px; }
.slider-header { display: flex; justify-content: space-between; margin-bottom: 10px; }
.slider-label-txt { font-size: 13px; color: var(--text-2); }
.slider-val-txt { font-size: 15px; font-weight: 800; }
.slider-controls { display: flex; align-items: center; gap: 10px; }
.s-btn {
  width: 36px; height: 36px; border-radius: 10px;
  border: 1px solid var(--border); background: var(--bg-3);
  color: var(--text-1); font-size: 18px;
  display: flex; align-items: center; justify-content: center;
  transition: all var(--transition); font-weight: 300;
}
.s-btn:hover { background: var(--bg-4); }
.s-btn:active { transform: scale(.95); }
.s-track { flex: 1; height: 4px; background: var(--bg-4); border-radius: 4px; overflow: hidden; }
.s-fill { height: 100%; border-radius: 4px; transition: width .3s; }
.sim-total-label { text-align: center; font-size: 12px; color: var(--text-3); margin-top: 16px; }

/* ── ALERTES ── */
.alerts-list { display: flex; flex-direction: column; gap: 10px; }
.alert-card {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 18px;
  background: var(--bg-2); border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  transition: all var(--transition);
}
.alert-card.off { opacity: .45; }
.alert-left { display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0; }
.alert-icon-box {
  width: 36px; height: 36px; border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.alert-asset { font-size: 14px; font-weight: 700; }
.alert-cond { font-size: 12px; color: var(--text-3); margin-top: 2px; font-family: var(--font-mono); }
.alert-actions { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.alert-del { color: var(--text-4); font-size: 16px; transition: color var(--transition); }
.alert-del:hover { color: var(--danger); }

/* ALERT FORM */
.alert-form-card {
  background: var(--bg-2); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 20px; margin-bottom: 16px;
  display: none;
}
.alert-form-card.open { display: block; }
.type-row { display: flex; gap: 8px; margin-bottom: 10px; }
.type-btn {
  flex: 1; padding: 10px; border-radius: var(--radius);
  border: 1px solid var(--border); background: var(--bg-3);
  font-size: 13px; font-weight: 600; color: var(--text-2);
  transition: all var(--transition);
}
.type-btn.up.on { border-color: var(--accent); background: rgba(22,163,74,.08); color: var(--accent-light); }
.type-btn.dn.on { border-color: var(--danger); background: rgba(220,38,38,.08); color: var(--danger-light); }

/* ── EDIT PAGE ── */
.edit-section { margin-bottom: 16px; }
.edit-acc-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 16px;
  background: var(--bg-2); border: 1px solid var(--border);
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
}
.edit-acc-label { font-size: 14px; font-weight: 700; }
.edit-acc-platform { font-size: 11px; color: var(--text-3); }
.edit-holding-row {

  padding: 11px 16px;
  background: var(--bg); border-left: 1px solid var(--border);
  border-right: 1px solid var(--border); border-bottom: 1px solid var(--border);
}
.edit-holding-row:last-of-type { border-bottom: none; }
.edit-h-name { font-size: 13px; font-weight: 600; }
.edit-h-meta { font-size: 11px; color: var(--text-3); margin-top: 2px; }
.edit-actions { display: flex; gap: 6px; flex-shrink: 0; }
.add-row-btn {
  width: 100%; padding: 11px;
  border: 1px dashed var(--border-2); border-top: none;
  border-radius: 0 0 var(--radius-lg) var(--radius-lg);
  background: var(--bg-3); color: var(--text-3);
  font-size: 13px; font-weight: 600;
  transition: all var(--transition);
}
.add-row-btn:hover { color: var(--text-1); background: var(--bg-4); }

/* ═══════════════════════════════════════════════
   MODAL
═══════════════════════════════════════════════ */
.modal-overlay {
  position: fixed; inset: 0;
  background: var(--overlay);
  backdrop-filter: blur(6px);
  z-index: 200;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-overlay.open { display: flex; }
.modal-box {
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-xl);
  width: 100%; max-width: 480px;
  max-height: 92vh; overflow-y: auto;
  box-shadow: var(--shadow-lg);
  animation: modalIn .2s cubic-bezier(.4,0,.2,1);
}
@keyframes modalIn { from{opacity:0;transform:scale(.96)translateY(8px)} to{opacity:1;transform:scale(1)translateY(0)} }
@media(max-width:600px) {
  .modal-overlay { align-items: flex-end; padding: 0; }
  .modal-box { border-radius: var(--radius-xl) var(--radius-xl) 0 0; max-width: 100%; }
}
.modal-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 20px 24px 0;
}
.modal-title { font-size: 17px; font-weight: 800; }
.modal-body { padding: 20px 24px; }
.modal-footer { padding: 0 24px 24px; display: flex; gap: 10px; }
.modal-field { margin-bottom: 14px; }
.modal-label { display: block; font-size: 11px; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
.chip-row { display: flex; gap: 6px; flex-wrap: wrap; }
.chip {

  font-size: 12px; font-weight: 600; color: var(--text-2);

.chip.active { border-color: var(--accent); background: rgba(22,163,74,.08); color: var(--accent-light); }

/* ═══════════════════════════════════════════════

.section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }

<script>
// ══════════════════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════════════════
const API = 'https://portfolio-api-j1go.vercel.app';

// ── SUPABASE CONFIG ────────────────────────────────────
const SB_URL = 'https://innpgitkqrhoynnlysin.supabase.co';
const SB_KEY = 'sb_publishable_cMRCLzNYfJih_moYlaUZiw_xic4lLXS';
const SB = {
  headers: {
    'Content-Type': 'application/json',
    'apikey': SB_KEY,
    'Authorization': `Bearer ${SB_KEY}`,
    'Prefer': 'return=representation',
  },
  async get(table, params='') {
    const r = await fetch(`${SB_URL}/rest/v1/${table}?${params}`, {headers: this.headers});
    return r.json();
  },
  async upsert(table, data) {
    const r = await fetch(`${SB_URL}/rest/v1/${table}`, {
      method: 'POST',
      headers: {...this.headers, 'Prefer': 'resolution=merge-duplicates,return=representation'},
      body: JSON.stringify(data),
    });
    return r.json();
  },
  async update(table, id, data) {
    const r = await fetch(`${SB_URL}/rest/v1/${table}?id=eq.${id}`, {
      method: 'PATCH', headers: this.headers, body: JSON.stringify(data),
    });
    return r.json();
  },
  async delete(table, id) {
    await fetch(`${SB_URL}/rest/v1/${table}?id=eq.${id}`, {
      method: 'DELETE', headers: this.headers,
    });
  },
  async insert(table, data) {
    const r = await fetch(`${SB_URL}/rest/v1/${table}`, {
      method: 'POST', headers: this.headers, body: JSON.stringify(data),
    });
    return r.json();
  },
};
const REFRESH_MS = 30000;

// ══════════════════════════════════════════════════════
// DONNÉES

const eur = n => new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR',maximumFractionDigits:0}).format(n);
const eurD = n => new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR',minimumFractionDigits:2,maximumFractionDigits:2}).format(n);
const tot = h => h.reduce((s,x)=>s+(x.current||0),0);
const inv = h => h.reduce((s,x)=>s+(x.invested||0),0);
const mon = p => Object.values(p).reduce((s,a)=>s+a.holdings.reduce((ss,h)=>ss+(h.monthly||0),0),0);
const fv = (m,y,r) => { const n=y*12,rt=r/12; return rt===0?m*n:m*((Math.pow(1+rt,n)-1)/rt)*(1+rt); };
const genId = () => Date.now().toString(36)+Math.random().toString(36).slice(2,5);
const hhmm = d => `${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
const sign = n => n>=0?'+':'';
const colorPnl = n => n>=0?'var(--accent-light)':'var(--danger-light)';
function badgePnl(n,pct){
  const cl=n>=0?'badge-green':'badge-red';
  return `<span class="badge ${cl}">${sign(n)}${eur(n)} (${sign(pct)}${pct.toFixed(2)}%)</span>`;
}

// ── SYNC SUPABASE ──────────────────────────────────────
async function loadFromSupabase() {
  try {
    // Récupère seulement les lignes uniques les plus récentes par (account_id, holding_id)
    const rows = await SB.get('portfolio', 
      'order=updated_at.desc&limit=100'
    );
    if(!rows || rows.length === 0) return null;

    // Déduplique : garde seulement la première occurrence de chaque holding_id par account
    const seen = new Set();
    const unique = rows.filter(r => {
      const key = `${r.account_id}:${r.holding_id}`;
      if(seen.has(key)) return false;
      seen.add(key);
      return true;
    });

    const p = {};
    // Ordre fixe des comptes
    const ORDER = ['pea','cto','av','pee'];
    ORDER.forEach(accId => {
      const accRows = unique.filter(r => r.account_id === accId);
      if(accRows.length === 0) return;
      const first = accRows[0];
      // Couleur/label/platform TOUJOURS depuis DEFAULT (pas Supabase) pour garder le design à jour
      const def = DEFAULT[accId] || {};
      p[accId] = {
        id: accId,
        label: def.label || first.account_label,
        platform: def.platform || first.account_platform,
        color: def.color || first.account_color,
        holdings: accRows.map(r => ({
          id: r.holding_id, name: r.name, isin: r.isin||'—',
          ticker: r.ticker, type: r.type,
          qty: r.qty ? parseFloat(r.qty) : null,
          invested: parseFloat(r.invested)||0,
          current: parseFloat(r.current_value)||0,
          monthly: parseFloat(r.monthly)||0,
        })),
      };
    });
    return Object.keys(p).length > 0 ? p : null;
  } catch(e) { console.warn('Supabase load error:', e); return null; }
}

async function saveToSupabase() {
  try {
    const rows = [];
    Object.values(P).forEach(acc => {
      acc.holdings.forEach(h => {
        rows.push({
          account_id: acc.id, account_label: acc.label,
          account_platform: acc.platform, account_color: acc.color,
          holding_id: h.id, name: h.name, isin: h.isin||'—',
          ticker: h.ticker||null, type: h.type,
          qty: h.qty||null, invested: h.invested||0,
          current_value: h.current||0, monthly: h.monthly||0,
          updated_at: new Date().toISOString(),
        });
      });
    });
    // Upsert avec contrainte unique : on_conflict DANS L'URL (pas en header)
    const r = await fetch(`${SB_URL}/rest/v1/portfolio?on_conflict=account_id,holding_id`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SB_KEY,
        'Authorization': `Bearer ${SB_KEY}`,
        'Prefer': 'resolution=merge-duplicates,return=minimal',
      },
      body: JSON.stringify(rows),
    });
    if(!r.ok) console.warn('Supabase save error:', await r.text());
  } catch(e) { console.warn('Supabase save error:', e); }
}

// ── SNAPSHOTS : historique du patrimoine ──────────────
// Enregistre la valeur totale du jour (1 par jour max)
async function saveSnapshot(){
  try {
    const totalCur = Object.values(P).reduce((s,a)=>s+tot(a.holdings),0);
    const totalInv = Object.values(P).reduce((s,a)=>s+invested(a.holdings),0);
    const perAcc = {};
    Object.values(P).forEach(a=>{ perAcc[a.id]=+tot(a.holdings).toFixed(2); });
    const today = new Date().toISOString().slice(0,10);
    // Vérifier s'il existe déjà un snapshot aujourd'hui
    const existing = await SB.get('snapshots', `day=eq.${today}&limit=1`);
    const payload = {
      day: today,
      total_value: +totalCur.toFixed(2),
      total_invested: +totalInv.toFixed(2),
      per_account: JSON.stringify(perAcc),
      created_at: new Date().toISOString(),
    };
    if(existing && existing.length>0){
      await SB.update('snapshots', existing[0].id, payload);
    } else {
      await SB.insert('snapshots', payload);
    }
  } catch(e) { console.warn('snapshot error', e); }
}

async function loadSnapshots(){
  try {
    const rows = await SB.get('snapshots', 'order=day.asc&limit=365');
    return rows || [];
  } catch(e) { return []; }
}

// FETCH LIVE
// ══════════════════════════════════════════════════════
async function fetchLive(){
  const tickers=[...new Set(Object.values(P).flatMap(a=>a.holdings.map(h=>h.ticker)).filter(Boolean))];
  if(!tickers.length) return;
  setStatus('loading');
  try{
    const res=await fetch(`${API}/api/quote?symbols=${encodeURIComponent(tickers.join(','))}`);
    const json=await res.json();
    if(!json.success) throw new Error();
    Object.values(P).forEach(acc=>acc.holdings.forEach(h=>{
      if(!h.ticker||!json.data[h.ticker]||json.data[h.ticker].error) return;
      const p=json.data[h.ticker];
      if(h.qty) h.current=+(h.qty*p.price).toFixed(2);
      h.marketData={price:p.price,change:p.change,changePercent:p.changePercent,currency:'EUR'};
    }));
    saveP(); lastUpdate=new Date(); setStatus('live');
    checkAlerts();
    // Dashboard : si des cartes sont dépliées, mise à jour douce (pas de re-render qui replie tout)
    if(page==='dashboard'){
      if(openAccounts.size>0) updateDashValues();
      else renderDash();
    }
    if(page==='portefeuille') renderPort();
    if(page==='alertes') renderAlerts();
    if(page==='detail'&&detail) updateDetailPrice();
  }catch(e){ setStatus('error'); }
}
function startRefresh(){ fetchLive(); clearInterval(refreshTimer); refreshTimer=setInterval(fetchLive,REFRESH_MS); }

// Trouve le prix actuel d'un actif par son nom
function getAssetPrice(assetName){
  for(const acc of Object.values(P)){
    for(const h of acc.holdings){
      if(h.name.toLowerCase()===assetName.toLowerCase() && h.marketData?.price){
        return h.marketData.price;
      }
      // Match partiel (premier mot)
      if(h.name.toLowerCase().includes(assetName.toLowerCase()) && h.marketData?.price){
        return h.marketData.price;
      }
    }
  }
  return null;
}

// Vérifie toutes les alertes actives
function checkAlerts(){
  let triggered=false;
  alerts.forEach(a=>{
    if(!a.active) return;
    const price=getAssetPrice(a.asset);
    if(price==null) return;
    const hit = a.type==='up' ? price>=a.value : price<=a.value;
    if(hit && !a.triggered){
      a.triggered=true;
      triggered=true;
      notifyAlert(a, price);
      saveAlertToSupabase(a);
    } else if(!hit && a.triggered){
      a.triggered=false; // reset si repassé de l'autre côté
      saveAlertToSupabase(a);
    }
  });
  if(triggered) localStorage.setItem('al',JSON.stringify(alerts));
}

// Notification quand une alerte se déclenche
function notifyAlert(a, price){
  // Notification native si autorisée
  if('Notification' in window && Notification.permission==='granted'){
    new Notification('🔔 Alerte prix', {
      body: `${a.asset} a atteint ${price.toFixed(2)}€ (seuil ${a.type==='up'?'≥':'≤'} ${a.value}€)`,
    });
  }
  // Bandeau visuel dans l'app
  showAlertBanner(`${a.asset} ${a.type==='up'?'a dépassé':'est descendu sous'} ${a.value}€ — actuellement ${price.toFixed(2)}€`);
}

function showAlertBanner(msg){
  let banner=document.getElementById('alert-banner');
  if(!banner){
    banner=document.createElement('div');
    banner.id='alert-banner';
    banner.style.cssText='position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:500;background:var(--amber);color:#000;padding:12px 20px;border-radius:12px;font-size:13px;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,.3);max-width:90%;text-align:center;cursor:pointer';
    banner.onclick=()=>banner.remove();
    document.body.appendChild(banner);
  }
  banner.textContent='🔔 '+msg;
  clearTimeout(banner._t);
  banner._t=setTimeout(()=>banner.remove(), 8000);
}

// Graphique ligne simple (pour le patrimoine) avec tooltip
function drawSimpleLine(data, containerId){
  const el=document.getElementById(containerId);
  if(!el||data.length<2) return;
  const W=el.offsetWidth||340, H=170;
  const P2={t:14,b:22,l:4,r:8};
  const prices=data.map(d=>d.price);
  const minP=Math.min(...prices), maxP=Math.max(...prices), rng=maxP-minP||1;
  const isUp=prices[prices.length-1]>=prices[0];
  const lc=isUp?'#22C55E':'#EF4444';
  const x=i=>P2.l+(i/(data.length-1))*(W-P2.l-P2.r);
  const y=p=>P2.t+(H-P2.t-P2.b)-((p-minP)/rng)*(H-P2.t-P2.b);
  const line=data.map((d,i)=>`${i===0?'M':'L'}${x(i).toFixed(1)},${y(d.price).toFixed(1)}`).join(' ');
  const fill=`${line} L${x(data.length-1).toFixed(1)},${(H-P2.b).toFixed(1)} L${P2.l},${(H-P2.b).toFixed(1)} Z`;
  const yl=[minP,(minP+maxP)/2,maxP];
  const grid=isDark?'#27272A':'#E4E4E7', lab=isDark?'#71717A':'#A1A1AA';
  let svg=`<svg width="${W}" height="${H}" style="display:block"><defs><linearGradient id="pg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${lc}" stop-opacity="${isDark?.18:.1}"/><stop offset="100%" stop-color="${lc}" stop-opacity="0"/></linearGradient></defs>`;
  yl.forEach(v=>{const yy=y(v);svg+=`<line x1="${P2.l}" y1="${yy.toFixed(1)}" x2="${W-P2.r}" y2="${yy.toFixed(1)}" stroke="${grid}" stroke-width="1" stroke-dasharray="3,4"/><text x="${P2.l+2}" y="${(yy-3).toFixed(1)}" fill="${lab}" font-size="9" font-family="monospace" opacity="0.7">${eur(v)}</text>`;});
  svg+=`<path d="${fill}" fill="url(#pg)"/><path d="${line}" stroke="${lc}" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>`;
  svg+=`<circle cx="${x(data.length-1).toFixed(1)}" cy="${y(prices[prices.length-1]).toFixed(1)}" r="4" fill="${lc}" stroke="${isDark?'#18181B':'#fff'}" stroke-width="2"/></svg>`;
  // footer
  const chg=prices[prices.length-1]-prices[0], chgPct=prices[0]>0?chg/prices[0]*100:0;
  const d1=new Date(data[0].time).toLocaleDateString('fr-FR',{day:'2-digit',month:'short'});
  const d2=new Date(data[data.length-1].time).toLocaleDateString('fr-FR',{day:'2-digit',month:'short'});
  svg+=`<div style="display:flex;justify-content:space-between;margin-top:6px;font-size:11px;color:var(--text-4);font-family:var(--font-mono)"><span>${d1} → ${d2}</span><span style="color:${isUp?'var(--accent-light)':'var(--danger-light)'}">${sign(chg)}${eur(chg)} (${sign(chgPct)}${chgPct.toFixed(1)}%)</span></div>`;
  el.innerHTML=svg;
}

function accIcon(id){
  const icons={
    pea:`<polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/>`,
    cto:`<line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/>`,
    av:`<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>`,
    pee:`<rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2"/>`,
  };
  return icons[id]||icons.pee;
}

function toggleAcc(id){
  const el=document.getElementById(`hold-${id}`);

// Mise à jour DOUCE des valeurs du dashboard (sans réécrire le HTML, garde l'état déplié)
function updateDashValues(){
  const totC=Object.values(P).reduce((s,a)=>s+tot(a.holdings),0);
  const totI=Object.values(P).reduce((s,a)=>s+invested(a.holdings),0);
  const g=totC-totI, gPct=totI>0?g/totI*100:0;
  // Patrimoine total
  const hv=document.querySelector('.hero-value'); if(hv) hv.textContent=eur(totC);
  const hc=document.querySelector('.hero-change .badge'); 
  if(hc){ hc.className='badge '+(g>=0?'badge-green':'badge-red'); hc.textContent=`${sign(g)}${eur(g)} (${sign(gPct)}${gPct.toFixed(2)}%)`; }
  // Valeurs par compte + lignes
  Object.values(P).forEach(acc=>{
    const v=tot(acc.holdings), i=invested(acc.holdings), gg=v-i, gpct=i>0?gg/i*100:0;
    const av=document.getElementById(`accval-${acc.id}`); if(av) av.textContent=eur(v);
    const ag=document.getElementById(`accgain-${acc.id}`);
    if(ag){ ag.style.color=gg>=0?'var(--accent-light)':'var(--danger-light)'; ag.textContent=`${sign(gg)}${gpct.toFixed(2)}%`; }
    acc.holdings.forEach(h=>{
      const hv2=document.getElementById(`hval-${acc.id}-${h.id}`); if(hv2) hv2.textContent=eurD(h.current||0);
      const hp=document.getElementById(`hperf-${acc.id}-${h.id}`);
      if(hp){ const hg=(h.current||0)-(h.invested||0), hgp=h.invested>0?hg/h.invested*100:0;
        hp.style.color=hg>=0?'var(--accent-light)':'var(--danger-light)'; hp.textContent=`${sign(hg)}${hgp.toFixed(1)}%`; }
    });
  });
}

async function loadChart(ticker, p, color){
  const ca=document.getElementById('chart-area');
  if(!ca) return;
  try{
    const map={'1d':'5m,1d','1wk':'1h,5d','1mo':'1d,1mo','6mo':'1wk,6mo','1y':'1wk,1y','5y':'1mo,5y'};
    const [iv,rg]=map[p].split(',');
    const res=await fetch(`${API}/api/quote?ticker=${encodeURIComponent(ticker)}&interval=${iv}&range=${rg}`);
    const json=await res.json();
    if(json.error||!json.data||json.data.length<2){ca.innerHTML='<div class="chart-loading">Données non disponibles</div>';return;}
    drawChart(json.data, color);
  }catch(e){ca.innerHTML='<div class="chart-loading">Erreur de connexion</div>';}
}

function drawChart(data, color){
  const ca=document.getElementById('chart-area');
  const cf=document.getElementById('chart-footer');
  if(!ca) return;

  const W=ca.offsetWidth||340, H=200;
  const P2={t:14,b:22,l:4,r:8};
  const prices=data.map(d=>d.price);

  // Seuils d'alerte pour cet actif
  const assetAlerts = detail ? alerts.filter(a => 
    a.active && (a.asset.toLowerCase()===detail.h.name.toLowerCase() || 
    detail.h.name.toLowerCase().includes(a.asset.toLowerCase()))
  ) : [];
  const alertValues = assetAlerts.map(a=>a.value);

  // min/max incluant les seuils d'alerte pour qu'ils soient visibles
  let minP=Math.min(...prices, ...alertValues);
  let maxP=Math.max(...prices, ...alertValues);
  const rng=maxP-minP||1;
  const isUp=prices[prices.length-1]>=prices[0];
  const lc=isUp?'#22C55E':'#EF4444';
  const x=i=>P2.l+(i/(data.length-1))*(W-P2.l-P2.r);
  const y=p=>P2.t+(H-P2.t-P2.b)-((p-minP)/rng)*(H-P2.t-P2.b);
  const line=data.map((d,i)=>`${i===0?'M':'L'}${x(i).toFixed(1)},${y(d.price).toFixed(1)}`).join(' ');
  const fill=`${line} L${x(data.length-1).toFixed(1)},${(H-P2.b).toFixed(1)} L${P2.l},${(H-P2.b).toFixed(1)} Z`;
  const yl=[minP, minP+rng*0.5, maxP];
  const gridColor=isDark?'#27272A':'#E4E4E7';
  const labelColor=isDark?'#71717A':'#A1A1AA';

  let svg=`<svg id="chart-svg" width="${W}" height="${H}" xmlns="http://www.w3.org/2000/svg" style="display:block;cursor:crosshair">
    <defs>
      <linearGradient id="cg" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${lc}" stop-opacity="${isDark?.18:.10}"/>
        <stop offset="100%" stop-color="${lc}" stop-opacity="0"/>
      </linearGradient>
      <clipPath id="clip"><rect x="${P2.l}" y="${P2.t}" width="${W-P2.l-P2.r}" height="${H-P2.t-P2.b}"/></clipPath>
    </defs>`;

  // Grid — lignes pleine largeur + labels discrets posés sur la ligne à gauche
  yl.forEach((v,i)=>{
    const yy=y(v);
    svg+=`<line x1="${P2.l}" y1="${yy.toFixed(1)}" x2="${W-P2.r}" y2="${yy.toFixed(1)}" stroke="${gridColor}" stroke-width="1" stroke-dasharray="3,4"/>`;
    // label au-dessus de la ligne, aligné à gauche, sauf la ligne du bas (évite chevauchement axe X)
    const ty = i===0 ? yy-3 : yy-3;
    svg+=`<text x="${P2.l+2}" y="${ty.toFixed(1)}" fill="${labelColor}" font-size="9" font-family="monospace" opacity="0.7">${v.toFixed(2)}</text>`;
  });

  // Area + line
  svg+=`<path d="${fill}" fill="url(#cg)" clip-path="url(#clip)"/>
    <path d="${line}" stroke="${lc}" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" clip-path="url(#clip)"/>`;

  // Lignes de seuil d'alerte
  assetAlerts.forEach(a=>{
    const ay=y(a.value);
    const acol = a.type==='up' ? '#16A34A' : '#DC2626';
    svg+=`<line x1="${P2.l}" y1="${ay.toFixed(1)}" x2="${W-P2.r}" y2="${ay.toFixed(1)}" stroke="${acol}" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.8"/>
    <rect x="${P2.l}" y="${(ay-8).toFixed(1)}" width="46" height="16" rx="3" fill="${acol}"/>
    <text x="${P2.l+4}" y="${(ay+3.5).toFixed(1)}" fill="#fff" font-size="9" font-weight="700" font-family="monospace">${a.type==='up'?'▲':'▼'} ${a.value}</text>`;
  });

  // Crosshair vertical (hidden by default)
  svg+=`<line id="tt-vline" x1="0" y1="${P2.t}" x2="0" y2="${H-P2.b}" stroke="${labelColor}" stroke-width="1" stroke-dasharray="4,3" display="none"/>`;

  // Hover dot
  svg+=`<circle id="tt-dot" cx="0" cy="0" r="5" fill="${lc}" stroke="${isDark?'#18181B':'#FFFFFF'}" stroke-width="2.5" display="none"/>`;

  // Last point dot
  svg+=`<circle cx="${x(data.length-1).toFixed(1)}" cy="${y(prices[prices.length-1]).toFixed(1)}" r="4" fill="${lc}" stroke="${isDark?'#18181B':'#FFFFFF'}" stroke-width="2"/>`;

  svg+=`</svg>`;

  // Wrapper avec tooltip
  const wrapper = document.createElement('div');
  wrapper.className = 'chart-wrapper';
  wrapper.innerHTML = svg + `<div class="chart-tooltip" id="chart-tooltip">
    <div class="tt-date" id="tt-date"></div>
    <div class="tt-price" id="tt-price"></div>
    <div class="tt-chg" id="tt-chg"></div>
  </div>`;
  ca.innerHTML = '';
  ca.appendChild(wrapper);

  // Interactions souris/touch
  const svgEl = wrapper.querySelector('#chart-svg');
  const tooltip = wrapper.querySelector('#chart-tooltip');
  const vline = wrapper.querySelector('#tt-vline');
  const dot = wrapper.querySelector('#tt-dot');
  const ttDate = wrapper.querySelector('#tt-date');
  const ttPrice = wrapper.querySelector('#tt-price');
  const ttChg = wrapper.querySelector('#tt-chg');
  const firstPrice = prices[0];

  function showTooltip(clientX){
    const rect = svgEl.getBoundingClientRect();
    const mx = clientX - rect.left;
    const chartW = W - P2.l - P2.r;
    const pct = Math.max(0, Math.min(1, (mx - P2.l) / chartW));
    const idx = Math.round(pct * (data.length - 1));
    const d = data[idx];
    if(!d) return;
    const px = x(idx), py = y(d.price);
    const chg = d.price - firstPrice;
    const chgPct = firstPrice > 0 ? chg/firstPrice*100 : 0;
    const isChgUp = chg >= 0;
    const dateStr = new Date(d.time).toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'});

    vline.setAttribute('x1', px.toFixed(1));
    vline.setAttribute('x2', px.toFixed(1));
    vline.removeAttribute('display');
    dot.setAttribute('cx', px.toFixed(1));
    dot.setAttribute('cy', py.toFixed(1));
    dot.removeAttribute('display');

    ttDate.textContent = dateStr;
    ttPrice.textContent = d.price.toFixed(3) + ' €';
    ttPrice.style.color = lc;
    ttChg.textContent = (isChgUp?'+':'') + chg.toFixed(3) + ' (' + (isChgUp?'+':'') + chgPct.toFixed(2) + '%)';
    ttChg.style.color = isChgUp ? '#22C55E' : '#EF4444';

    tooltip.style.display = 'block';
    let left = px + 12;
    if(left + 160 > W) left = px - 160;
    let top = py - 50;
    if(top < 0) top = 4;
    tooltip.style.left = left + 'px';
    tooltip.style.top = top + 'px';
  }

  function hideTooltip(){
    tooltip.style.display = 'none';
    vline.setAttribute('display','none');
    dot.setAttribute('display','none');
  }

  svgEl.addEventListener('mousemove', e => showTooltip(e.clientX));
  svgEl.addEventListener('mouseleave', hideTooltip);
  svgEl.addEventListener('touchmove', e => { e.preventDefault(); showTooltip(e.touches[0].clientX); }, {passive:false});
  svgEl.addEventListener('touchend', hideTooltip);

  // Footer
  if(cf){
    const chg=prices[prices.length-1]-prices[0];
    const chgPct=firstPrice>0?chg/firstPrice*100:0;
    const d1=new Date(data[0].time), d2=new Date(data[data.length-1].time);
    const fmt=d=>d.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'2-digit'});
    cf.innerHTML=`<span>${fmt(d1)} → ${fmt(d2)}</span><span style="color:${isUp?'var(--accent-light)':'var(--danger-light)'}">${sign(chg)}${chg.toFixed(3)} (${sign(chgPct)}${chgPct.toFixed(2)}%)</span>`;
  }
}

// ── CAMEMBERT ──────────────────────────────────────────
function drawPie(data, containerId){
  const el = document.getElementById(containerId);
  if(!el) return;
  const total = data.reduce((s,d)=>s+d.value,0);
  if(total<=0){el.innerHTML='<div style="color:var(--text-3);font-size:13px">Aucune donnée</div>';return;}
  const SIZE = 140, CX = SIZE/2, CY = SIZE/2, R = 58, IR = 30;
  let startAngle = -Math.PI/2;
  let paths = '', hoveredIdx = -1;

  function buildSVG(hovered=-1){
    let svgPaths = '';
    data.forEach((d,i)=>{
      const pct = d.value/total;
      const angle = pct * Math.PI * 2;
      const endAngle = startAngle + angle;
      // calc per slice
      const sa = data.slice(0,i).reduce((s,x)=>s+x.value/total*Math.PI*2,-Math.PI/2);
      const ea = sa + pct*Math.PI*2;
      const x1=CX+R*Math.cos(sa), y1=CY+R*Math.sin(sa);
      const x2=CX+R*Math.cos(ea), y2=CY+R*Math.sin(ea);
      const ix1=CX+IR*Math.cos(sa), iy1=CY+IR*Math.sin(sa);
      const ix2=CX+IR*Math.cos(ea), iy2=CY+IR*Math.sin(ea);
      const large=pct>0.5?1:0;
      const scale = hovered===i ? 1.06 : 1;
      const tx = (CX + (R+IR)/2*Math.cos((sa+ea)/2)) * (scale-1);
      const ty = (CY + (R+IR)/2*Math.sin((sa+ea)/2)) * (scale-1);
      const path = `M${ix1.toFixed(2)},${iy1.toFixed(2)} L${x1.toFixed(2)},${y1.toFixed(2)} A${R},${R} 0 ${large},1 ${x2.toFixed(2)},${y2.toFixed(2)} L${ix2.toFixed(2)},${iy2.toFixed(2)} A${IR},${IR} 0 ${large},0 ${ix1.toFixed(2)},${iy1.toFixed(2)} Z`;
      svgPaths += `<path d="${path}" fill="${d.color}" opacity="${hovered===-1||hovered===i?1:0.5}" transform="translate(${tx.toFixed(2)},${ty.toFixed(2)})" style="cursor:pointer;transition:all .2s" data-idx="${i}"/>`;
    });
    return svgPaths;
  }

  function render(hovered=-1){
    const svg = `<svg width="${SIZE}" height="${SIZE}" viewBox="0 0 ${SIZE} ${SIZE}" style="overflow:visible">${buildSVG(hovered)}</svg>`;
    el.querySelector('.pie-svg-wrap').innerHTML = svg;
    el.querySelectorAll('path[data-idx]').forEach(p=>{
      p.addEventListener('mouseenter',()=>render(+p.dataset.idx));
      p.addEventListener('mouseleave',()=>render(-1));
    });
  }

  // Legend
  const legendHtml = data.map(d=>`
    <div class="pie-legend-item">
      <div class="pie-legend-dot" style="background:${d.color}"></div>
      <span class="pie-legend-label">${d.label}</span>
      <span class="pie-legend-val">${eur(d.value)}</span>
      <span class="pie-legend-pct">${(d.value/total*100).toFixed(1)}%</span>
    </div>`).join('');

  el.innerHTML = `<div class="pie-wrapper">
    <div class="pie-svg-wrap"></div>
    <div class="pie-legend">${legendHtml}</div>
  </div>`;

  render();
}

let alertMode='price';

  alertMode=m;
  document.getElementById('afm-price')?.classList.toggle('on',m==='price');
  document.getElementById('afm-pct')?.classList.toggle('on',m==='pct');
  document.getElementById('afm-price').style.borderColor = m==='price'?'var(--blue)':'var(--border)';
  document.getElementById('afm-price').style.color = m==='price'?'var(--blue-light)':'var(--text-2)';
  document.getElementById('afm-pct').style.borderColor = m==='pct'?'var(--blue)':'var(--border)';

  if(m==='pct'){ lbl.textContent='Variation (%) — ex: 5 pour +5%'; inp.placeholder='Ex: 5'; }
  else { lbl.textContent='Prix cible (€)'; inp.placeholder='Ex: 90.00'; }
  updateAlertPreview();
}
function updateAlertPreview(){
  const prev=document.getElementById('af-preview');
  if(!prev) return;
  const asset=document.getElementById('af-asset')?.value?.trim();
  const val=parseFloat(document.getElementById('af-val')?.value);
  if(!asset||isNaN(val)){ prev.textContent=''; return; }
  const cur=getAssetPrice(asset);
  if(cur==null){ prev.innerHTML='<span style="color:var(--text-4)">Prix actuel indisponible</span>'; return; }
  if(alertMode==='pct'){
    const target = newAT==='up' ? cur*(1+val/100) : cur*(1-val/100);
    prev.innerHTML=`Prix actuel: <b>${cur.toFixed(2)}€</b> → seuil calculé: <b style="color:var(--blue-light)">${target.toFixed(2)}€</b>`;
  } else {
    const dist=((val-cur)/cur*100);
    prev.innerHTML=`Prix actuel: <b>${cur.toFixed(2)}€</b> (${sign(dist)}${dist.toFixed(1)}% du seuil)`;
  }
}
function addAlert(){
  const asset=document.getElementById('af-asset')?.value?.trim();
  let val=parseFloat(document.getElementById('af-val')?.value);
  if(!asset||isNaN(val)){alert('Remplis tous les champs');return;}
  // Mode pourcentage : convertir en prix cible absolu
  let pctInfo=null;
  if(alertMode==='pct'){
    const cur=getAssetPrice(asset);
    if(cur==null){alert('Prix actuel indisponible pour cet actif');return;}
    pctInfo={base:cur, pct:val};
    val = newAT==='up' ? cur*(1+val/100) : cur*(1-val/100);
    val = +val.toFixed(2);
  }
  if(val<=0){alert('Valeur invalide');return;}
  const newAlert={id:Date.now(),asset,type:newAT,value:val,active:true,triggered:false,pctInfo};
  alerts.push(newAlert);
  saveAlertToSupabase(newAlert);
  localStorage.setItem('al',JSON.stringify(alerts));
  renderAlerts();
}
function toggleA(id){
  alerts=alerts.map(a=>{
    if(a.id===id){const u={...a,active:!a.active};saveAlertToSupabase(u);return u;}
    return a;
  });
  localStorage.setItem('al',JSON.stringify(alerts));renderAlerts();
}
function delAlert(id){
  if(!confirm('Supprimer ?'))return;
  const a=alerts.find(x=>x.id===id);
  if(a?._dbId) deleteAlertFromSupabase(a._dbId);
  alerts=alerts.filter(x=>x.id!==id);
  localStorage.setItem('al',JSON.stringify(alerts));renderAlerts();
}

// Remet invested = current pour toutes les lignes (jour 0)
async function resetToToday(){
  if(!confirm('Remettre tous les montants investis à la valeur actuelle ? Le gain repartira à 0% pour toutes tes positions.')) return;
  showAlertBanner('Récupération des cours en cours...');
  // D'abord récupérer les cours live à jour
  await fetchLive();
  // Puis aligner invested sur la valeur actuelle
  Object.values(P).forEach(acc=>{
    acc.holdings.forEach(h=>{
      h.invested = h.current || 0;
      if(h.qty && h.qty>0) h.pru = +(h.current/h.qty).toFixed(4);
    });
  });
  saveP();
  await resyncSupabase();
  renderEdit();
  showAlertBanner('Portefeuille réinitialisé — gain à 0% pour aujourd\'hui');
}

// Aperçu auto du montant investi = qty × PRU
function updateInvestedPreview(){
  const qty=parseFloat(document.getElementById('f-qty')?.value)||0;
  const pru=parseFloat(document.getElementById('f-pru')?.value)||0;
  if(qty>0 && pru>0){
    document.getElementById('f-invested').value=(qty*pru).toFixed(2);
  }
}

function saveHolding(){
  const name=document.getElementById('f-name').value.trim();
  if(!name){alert('Le nom est obligatoire');return;}
  const oldH = editH ? P[editAccId]?.holdings.find(x=>x.id===editH.id) : null;

  const qty = document.getElementById('f-qty').value ? parseFloat(document.getElementById('f-qty').value) : null;
  const pru = parseFloat(document.getElementById('f-pru').value)||0;
  let invested = parseFloat(document.getElementById('f-invested').value)||0;
  // Si PRU et qty fournis mais pas de montant investi explicite, calculer
  if(qty && pru && !invested) invested = qty*pru;

  let current = parseFloat(document.getElementById('f-current').value)||0;
  // Si pas de valeur actuelle saisie : si ticker -> sera calculé par le cours live, sinon = investi
  const ticker = document.getElementById('f-ticker').value.trim()||null;
  if(!current){
    if(ticker && oldH?.marketData?.price && qty) current = +(qty*oldH.marketData.price).toFixed(2);
    else current = invested;
  }

  const h={
    id:editH?.id||genId(),
    _dbId:editH?._dbId||null,
    name,
    isin:document.getElementById('f-isin').value.trim()||'—',
    ticker,
    type:curType,
    invested,
    current,
    qty,
    pru: pru || (qty ? +(invested/qty).toFixed(4) : null),
    monthly:parseFloat(document.getElementById('f-monthly').value)||0,
  };
  if(oldH?.marketData) h.marketData = oldH.marketData;

  // Enregistrer l'ordre correspondant
  if(!editH) {
    saveOrder({
      accountId: editAccId, name: h.name, ticker: h.ticker,
      type: 'ACHAT', qty: h.qty||1, price: h.pru||h.current,
      total: h.invested||h.current, date: new Date().toISOString(),
    });
  } else if(oldH && h.qty && oldH.qty && h.qty !== oldH.qty) {
    const diff = h.qty - oldH.qty;
    const prixUnit = h.pru || (h.qty ? h.invested/h.qty : 0);
    saveOrder({
      accountId: editAccId, name: h.name, ticker: h.ticker,
      type: diff > 0 ? 'ACHAT' : 'VENTE',
      qty: Math.abs(diff), price: prixUnit,
      total: Math.abs(diff) * prixUnit,
      date: new Date().toISOString(),
    });
  }

  const acc=P[editAccId];
  const idx=acc.holdings.findIndex(x=>x.id===h.id);
  if(idx>=0)acc.holdings[idx]=h; else acc.holdings.push(h);
  saveP(); closeModal(); renderEdit();
}

function delH(accId,hId){
  if(!confirm('Supprimer cette ligne ?'))return;
  const h = P[accId].holdings.find(x=>x.id===hId);
  deleteFromSupabase(accId, hId);
  P[accId].holdings=P[accId].holdings.filter(x=>x.id!==hId);
  saveP(); renderEdit();
}

async function submitOrder() {
  const name = document.getElementById('o-name')?.value?.trim();
  const qty = parseFloat(document.getElementById('o-qty')?.value);
  const price = parseFloat(document.getElementById('o-price')?.value);
  const accId = document.getElementById('o-account')?.value;
  const date = document.getElementById('o-date')?.value;
  const notes = document.getElementById('o-notes')?.value?.trim();
  const ticker = document.getElementById('o-ticker')?.value?.trim();

  if(!name || isNaN(qty) || qty<=0 || isNaN(price) || price<=0) {
    alert('Remplis les champs obligatoires : nom, quantité, prix');
    return;
  }

  const order = {
    accountId: accId||'pea', name, ticker: ticker||null,
    type: orderType, qty, price, total: qty*price,
    date: date ? new Date(date).toISOString() : new Date().toISOString(),
    notes: notes||null,
  };

  await saveOrder(order);
  showOrderForm = false;
  renderHistorique();
}

  html += `</div>`;
  pg.innerHTML = html;
  if(showOrderForm) { document.getElementById('order-form').style.display='block'; }
  setOrderType(orderType);
}

// INIT
// ══════════════════════════════════════════════════════
applyTheme();

// Reset d'urgence : ajoute ?reset=1 à l'URL pour repartir des données par défaut
if(new URLSearchParams(location.search).get('reset')==='1'){
  localStorage.clear();
  // Efface aussi Supabase puis recharge proprement
  (async()=>{
    try{
      await fetch(`${SB_URL}/rest/v1/portfolio?account_id=neq.__x__`,{method:'DELETE',headers:{'apikey':SB_KEY,'Authorization':`Bearer ${SB_KEY}`}});
    }catch(e){}
    P = JSON.parse(JSON.stringify(DEFAULT));
    await saveToSupabase();
    location.href = location.pathname; // recharge sans le param
  })();
}

// Demander la permission de notification (pour les alertes)
if('Notification' in window && Notification.permission==='default'){
  setTimeout(()=>Notification.requestPermission(), 3000);
}

// Loader pendant sync Supabase
document.getElementById('content').innerHTML = `
  <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:70vh;gap:16px">
    <div style="width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite"></div>
    <div style="color:var(--text-3);font-size:14px">Synchronisation...</div>
    <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
  </div>`;

(async () => {
  const sbPortfolio = await loadFromSupabase();
  if(sbPortfolio && Object.keys(sbPortfolio).length > 0) {
    P = sbPortfolio;
    localStorage.setItem('pf', JSON.stringify(P));
  }

  const sbAlerts = await loadAlertsFromSupabase();
  if(sbAlerts && sbAlerts.length > 0) {
    alerts = sbAlerts;
    localStorage.setItem('al', JSON.stringify(alerts));
  }

  const sbSim = await loadSimFromSupabase();
  if(sbSim) { simM = parseFloat(sbSim.monthly); simY = parseInt(sbSim.years); }
  else simM = mon(P);

  // Restaurer le contenu (TOUTES les pages dont historique)
  document.getElementById('content').innerHTML = `
    <div class="page active" id="page-dashboard"></div>
    <div class="page" id="page-portefeuille"></div>
    <div class="page" id="page-detail"></div>
    <div class="page" id="page-simulation"></div>
    <div class="page" id="page-alertes"></div>
    <div class="page" id="page-edit"></div>
    <div class="page" id="page-historique"></div>
  `;

  renderDash();
  startRefresh();
  // Enregistrer le snapshot du patrimoine du jour (après que les cours soient chargés)
  setTimeout(()=>{ saveSnapshot().then(()=>{ if(page==='dashboard') loadAndDrawPatrimoine(); }); }, 5000);
})();
</script>
<script>
// ─── PWA : Service Worker ───
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(e=>console.log('SW:',e));
  });
}
// ─── PWA : Prompt d'installation ───
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt', e=>{
  e.preventDefault();
  deferredPrompt=e;
  showInstallButton();
});
function showInstallButton(){
  if(document.getElementById('pwa-install-btn')) return;
  const btn=document.createElement('button');
  btn.id='pwa-install-btn';
  btn.innerHTML='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:6px"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Installer l\'app';
  btn.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:300;background:var(--accent);color:#fff;border:none;padding:12px 24px;border-radius:24px;font-size:14px;font-weight:700;box-shadow:0 8px 24px rgba(0,0,0,.3);cursor:pointer;font-family:inherit';
  btn.onclick=async()=>{
    if(!deferredPrompt) return;
    deferredPrompt.prompt();
    const {outcome}=await deferredPrompt.userChoice;
    deferredPrompt=null;
    btn.remove();
  };
  document.body.appendChild(btn);
}
// Si déjà installée, masquer le bouton
window.addEventListener('appinstalled', ()=>{
  document.getElementById('pwa-install-btn')?.remove();
  // Demander permission notifications une fois installée
  if('Notification' in window && Notification.permission==='default'){
    Notification.requestPermission();
  }
});
</script>
